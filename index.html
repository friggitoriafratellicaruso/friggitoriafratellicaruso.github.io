const NAV=[
  {id:"dashboard",label:"Dashboard",icon:"📊"},
  {id:"cassa",label:"Cassa",icon:"🛒"},
  {id:"clienti",label:"Clienti",icon:"👥"},
  {id:"instantwin",label:"Instant Win",icon:"🎰"},
  {id:"giftcard",label:"Gift Card",icon:"💳"},
  {id:"menu",label:"Menù",icon:"🍽️"},
  {id:"notifiche",label:"Notifiche",icon:"🔔"},
  {id:"segmenti",label:"Segmenti",icon:"🏷️"},
  {id:"premi",label:"Premi Catalogo",icon:"🏅",adminOnly:true},
  {id:"addetti",label:"Addetti",icon:"👮",adminOnly:true},
];


// ══════════════════════════════════════════════════════════════════════════
// ADDETTI — solo admin
// ══════════════════════════════════════════════════════════════════════════
function Addetti({addetto}){
  const{data:addetti,loading,err,load}=useTable("addetti","id");
  const[showAdd,setShowAdd]=useState(false);
  const[editItem,setEditItem]=useState(null);
  const[form,setForm]=useState({nome:"",pin:"",ruolo:"addetto"});
  const[saving,setSaving]=useState(false);
  const[formErr,setFormErr]=useState("");
  const[showLog,setShowLog]=useState(null); // addetto id per vedere storico
  const[log,setLog]=useState([]);
  const[logLoading,setLogLoading]=useState(false);
  const[tab,setTab]=useState("lista");

  const isAdmin=addetto?.ruolo==="admin";

  const saveAddetto=async()=>{
    if(!form.nome.trim()||!form.pin.trim()){setFormErr("Nome e PIN obbligatori.");return;}
    if(!/^\d{4,8}$/.test(form.pin)){setFormErr("Il PIN deve essere numerico, 4-8 cifre.");return;}
    setSaving(true);setFormErr("");
    try{
      if(editItem){
        await sb.from("addetti").update({nome:form.nome.trim(),pin:form.pin,ruolo:form.ruolo}).eq("id",editItem.id);
      }else{
        // Verifica PIN non già usato
        const{data:existing}=await sb.from("addetti").select("id").eq("pin",form.pin);
        if(existing&&existing.length>0){setFormErr("PIN già in uso da un altro addetto.");setSaving(false);return;}
        await sb.from("addetti").insert({nome:form.nome.trim(),pin:form.pin,ruolo:form.ruolo,attivo:true});
      }
      setShowAdd(false);setEditItem(null);setForm({nome:"",pin:"",ruolo:"addetto"});load();
    }catch(e){setFormErr(e.message);}
    setSaving(false);
  };

  const toggleAttivo=async(a)=>{
    if(a.id===addetto?.id){alert("Non puoi disattivare te stesso.");return;}
    await sb.from("addetti").update({attivo:!a.attivo}).eq("id",a.id);
    load();
  };

  const loadLog=async(addettoId)=>{
    setLogLoading(true);setLog([]);
    const nomeAddetto=addetti.find(a=>a.id===addettoId)?.nome||"";
    // Carica acquisti con customer_id per fare join
    const{data:acquisti}=await sb.from("acquisti").select("id,importo,punti,created_at,created_time,status,customer_id,token_iw,annullato,annullato_at,annullato_da").eq("addetto_id",addettoId).order("created_at",{ascending:false}).limit(50);
    // Carica token emessi dall'addetto
    const{data:tokens}=await sb.from("tokens").select("token,customer_name,campaign_name,created_at,status,prize_name,customer_id").eq("addetto_id",addettoId).order("created_at",{ascending:false}).limit(50);
    // Carica clienti registrati da questo addetto
    const{data:clientiReg}=await sb.from("clienti").select("name,cognome,email,join_date,created_time").eq("addetto_registrazione",nomeAddetto).limit(50);
    // Raccogli tutti i customer_id unici da acquisti e token
    const ids=[
      ...(acquisti||[]).map(a=>a.customer_id),
      ...(tokens||[]).map(t=>t.customer_id),
    ].filter(Boolean);
    const uniqueIds=[...new Set(ids)];
    let clientiMap={};
    if(uniqueIds.length>0){
      const{data:clientiDati}=await sb.from("clienti").select("id,name,cognome,email").in("id",uniqueIds);
      (clientiDati||[]).forEach(c=>{clientiMap[c.id]=c;});
    }
    // Merge e ordina per data
    const entries=[
      ...(acquisti||[]).map(a=>{
        const cl=clientiMap[a.customer_id];
        const nomeCliente=cl?(cl.name+(cl.cognome?" "+cl.cognome:"")):"Cliente non registrato";
        const emailCliente=cl?.email||"—";
        return {
          tipo:"💳 Acquisto",
          acqId:a.id,
          importo:a.importo,
          punti:a.punti,
          customer_id:a.customer_id,
          token_iw:a.token_iw,
          nomeCliente,
          emailCliente,
          desc:`€${Number(a.importo).toFixed(2)} → +${a.punti} pt`,
          stato:a.annullato?"Annullato":a.status==="usato"?"Scansionato":"In attesa",
          annullato:a.annullato,
          annullato_at:a.annullato_at,
          annullato_da:a.annullato_da,
          data:a.created_time||a.created_at,
        };
      }),
      ...(tokens||[]).map(t=>{
        const cl=clientiMap[t.customer_id];
        const nomeCliente=cl?(cl.name+(cl.cognome?" "+cl.cognome:"")):(t.customer_name||"—");
        const emailCliente=cl?.email||"—";
        return {
          tipo:"🎰 Token IW",
          nomeCliente,
          emailCliente,
          desc:`Campagna: ${t.campaign_name}`,
          stato:t.status,
          extra:t.prize_name?`Premio: ${t.prize_name}`:"",
          data:t.created_at,
        };
      }),
      ...(clientiReg||[]).map(c=>({
        tipo:"👤 Registrazione",
        nomeCliente:c.name+(c.cognome?" "+c.cognome:""),
        emailCliente:c.email||"—",
        desc:"Nuovo cliente registrato",
        stato:"Completata",
        data:c.created_time||c.join_date,
      })),
    ].sort((a,b)=>new Date(b.data)-new Date(a.data));
    setLog(entries);setLogLoading(false);
  };

  const annullaAcquisto=async(entry)=>{
    if(!confirm(`Annullare l'acquisto di €${Number(entry.importo).toFixed(2)} per ${entry.nomeCliente}?\n\nVerranno rimossi i punti e invalidato il QR.`))return;
    try{
      // 1. Marca acquisto come annullato
      await sb.from("acquisti").update({
        annullato:true,
        annullato_at:new Date().toISOString(),
        annullato_da:addetto?.nome||"admin",
        status:"annullato"
      }).eq("id",entry.acqId);
      // 2. Se c'è un token IW collegato, invalidalo
      if(entry.token_iw){
        await sb.from("tokens").update({status:"Annullato",won:false}).eq("id",entry.token_iw);
      }
      // 3. Se il cliente ha già usato il QR (punti accreditati), storna i punti
      if(entry.customer_id&&entry.punti>0){
        const{data:cl}=await sb.from("clienti").select("points").eq("id",entry.customer_id).single();
        if(cl){
          const newPts=Math.max(0,cl.points-entry.punti);
          await sb.from("clienti").update({points:newPts,tier:calcTier(newPts)}).eq("id",entry.customer_id);
        }
      }
      // Ricarica log
      const addettoId=showLog;
      await loadLog(addettoId);
      alert("✅ Acquisto annullato.");
    }catch(e){alert("Errore: "+e.message);}
  };

  if(!isAdmin)return <div style={{padding:24,textAlign:"center"}}>
    <div style={{fontSize:40,marginBottom:12}}>🔒</div>
    <div style={{color:C.muted,fontSize:14}}>Sezione riservata all'amministratore.</div>
  </div>;

  return <div className="fade">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
      <div><h2 style={{margin:0,fontSize:20,color:C.text}}>Addetti</h2><p style={{margin:"4px 0 0",color:C.muted,fontSize:13}}>{addetti.filter(a=>a.attivo).length} attivi</p></div>
      <Btn onClick={()=>{setForm({nome:"",pin:"",ruolo:"addetto"});setEditItem(null);setShowAdd(true);}}>+ Nuovo</Btn>
    </div>

    {/* Tabs */}
    <div style={{display:"flex",gap:4,marginBottom:16,background:C.primary,borderRadius:10,padding:4}}>
      {[["lista","👥 Lista"],["log","📋 Storico operazioni"]].map(([id,label])=><button key={id} onClick={()=>setTab(id)} style={{flex:1,background:tab===id?C.card:"none",color:tab===id?C.text:C.muted,border:"none",borderRadius:8,padding:"8px 14px",cursor:"pointer",fontWeight:tab===id?700:400,fontSize:13}}>{label}</button>)}
    </div>

    {tab==="lista"&&<div>
      {loading?<Loading/>:addetti.map(a=><div key={a.id} style={{background:C.card,borderRadius:12,padding:16,marginBottom:10,border:`1px solid ${a.attivo?C.border:C.dim}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:40,height:40,background:a.ruolo==="admin"?`linear-gradient(135deg,${C.accent},${C.gold})`:`linear-gradient(135deg,${C.teal},${C.blue})`,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>
              {a.ruolo==="admin"?"👑":"👤"}
            </div>
            <div>
              <div style={{color:a.attivo?C.text:C.muted,fontWeight:700,fontSize:15}}>{a.nome}</div>
              <div style={{display:"flex",gap:8,marginTop:3}}>
                <span style={{background:(a.ruolo==="admin"?C.accent:C.teal)+"22",color:a.ruolo==="admin"?C.accent:C.teal,border:`1px solid ${(a.ruolo==="admin"?C.accent:C.teal)}44`,borderRadius:20,padding:"2px 8px",fontSize:11,fontWeight:600}}>{a.ruolo}</span>
                {!a.attivo&&<span style={{background:C.dim+"22",color:C.muted,borderRadius:20,padding:"2px 8px",fontSize:11}}>Disattivato</span>}
              </div>
            </div>
          </div>
          <div style={{display:"flex",gap:6}}>
            <Btn sm color={C.teal} outline onClick={()=>{setShowLog(a.id);loadLog(a.id);setTab("log");}}>📋</Btn>
            {a.id!==addetto?.id&&<>
              <Btn sm color={C.gold} outline onClick={()=>{setEditItem(a);setForm({nome:a.nome,pin:a.pin,ruolo:a.ruolo});setShowAdd(true);}}>✏️</Btn>
              <Btn sm color={a.attivo?C.accent:C.green} outline onClick={()=>toggleAttivo(a)}>{a.attivo?"🔒":"🔓"}</Btn>
            </>}
            {a.id===addetto?.id&&<span style={{color:C.muted,fontSize:11,padding:"6px 10px"}}>← Sei tu</span>}
          </div>
        </div>
        <div style={{display:"flex",gap:16,marginTop:4}}>
          <div style={{color:C.muted,fontSize:12}}>PIN: <span style={{fontFamily:"monospace",color:C.dim}}>{"•".repeat(a.pin?.length||4)}</span></div>
          <div style={{color:C.muted,fontSize:12}}>Dal: {a.created_at?.slice(0,10)||"—"}</div>
        </div>
      </div>)}
    </div>}

    {tab==="log"&&<div>
      {/* Selettore addetto */}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
        {addetti.map(a=><button key={a.id} onClick={()=>{setShowLog(a.id);loadLog(a.id);}} style={{background:showLog===a.id?C.accent:C.card,color:showLog===a.id?"#fff":C.muted,border:"none",borderRadius:20,padding:"6px 14px",cursor:"pointer",fontSize:12,fontWeight:showLog===a.id?700:400}}>{a.nome}</button>)}
      </div>
      {!showLog&&<div style={{background:C.card,borderRadius:12,padding:24,textAlign:"center",color:C.muted,fontSize:14}}>Seleziona un addetto per vedere le sue operazioni</div>}
      {showLog&&logLoading&&<Loading/>}
      {showLog&&!logLoading&&log.length===0&&<div style={{background:C.card,borderRadius:12,padding:24,textAlign:"center",color:C.muted,fontSize:14}}>Nessuna operazione registrata</div>}
      {showLog&&!logLoading&&log.map((entry,i)=><div key={i} style={{background:C.card,borderRadius:12,padding:14,marginBottom:8,border:`1px solid ${entry.annullato?C.accent+"33":C.border+"22"}`,opacity:entry.annullato?0.65:1}}>
        <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
          <div style={{fontSize:20,flexShrink:0}}>{entry.tipo.split(" ")[0]}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
              <div style={{color:C.text,fontSize:13,fontWeight:600}}>{entry.tipo.split(" ").slice(1).join(" ")}</div>
              <div style={{color:C.dim,fontSize:11,flexShrink:0,marginLeft:8}}>{entry.data?.slice(0,16).replace("T"," ")||"—"}</div>
            </div>
            {/* Cliente */}
            <div style={{background:C.primary,borderRadius:8,padding:"7px 10px",marginBottom:6}}>
              <div style={{color:C.text,fontSize:12,fontWeight:600}}>{entry.nomeCliente}</div>
              <div style={{color:C.muted,fontSize:11,marginTop:2}}>✉️ {entry.emailCliente}</div>
            </div>
            <div style={{color:C.muted,fontSize:12}}>{entry.desc}</div>
            {entry.extra&&<div style={{color:C.gold,fontSize:11,marginTop:2}}>{entry.extra}</div>}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:6}}>
              <span style={{background:(entry.annullato?C.accent:entry.stato==="Scansionato"||entry.stato==="Completata"?C.green:C.teal)+"22",color:entry.annullato?C.accent:entry.stato==="Scansionato"||entry.stato==="Completata"?C.green:C.teal,border:`1px solid ${(entry.annullato?C.accent:entry.stato==="Scansionato"||entry.stato==="Completata"?C.green:C.teal)}44`,borderRadius:20,padding:"2px 8px",fontSize:10,fontWeight:600}}>
                {entry.annullato?"🚫 Annullato":entry.stato}
              </span>
              {/* Pulsante annulla — solo acquisti non ancora annullati */}
              {entry.tipo==="💳 Acquisto"&&!entry.annullato&&<button onClick={()=>annullaAcquisto(entry)} style={{background:"none",border:`1px solid ${C.accent}66`,color:C.accent,borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:11,fontWeight:600,flexShrink:0}}>🚫 Annulla</button>}
            </div>
            {entry.annullato&&<div style={{color:C.muted,fontSize:10,marginTop:4}}>Annullato il {entry.annullato_at?.slice(0,10)||"—"} da {entry.annullato_da||"—"}</div>}
          </div>
        </div>
      </div>)}
    </div>}

    {showAdd&&<Modal title={editItem?"✏️ Modifica addetto":"👮 Nuovo addetto"} onClose={()=>{setShowAdd(false);setEditItem(null);}}>
      {formErr&&<div style={{background:C.accent+"22",border:`1px solid ${C.accent}44`,borderRadius:8,padding:"10px 14px",color:C.accent,fontSize:13,marginBottom:12}}>{formErr}</div>}
      <Inp label="Nome" value={form.nome} onChange={v=>setForm({...form,nome:v})} placeholder="Es. Mario Rossi" req/>
      <div style={{marginBottom:13}}>
        <label style={{color:C.muted,fontSize:11,display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:.5}}>PIN numerico (4-8 cifre) <span style={{color:C.accent}}>*</span></label>
        <input type="password" inputMode="numeric" value={form.pin} onChange={e=>setForm({...form,pin:e.target.value.replace(/\D/g,"")})} placeholder="••••" maxLength={8} style={{width:"100%",background:C.primary,color:C.text,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px",fontSize:18,letterSpacing:6,textAlign:"center",boxSizing:"border-box"}}/>
        <div style={{color:C.dim,fontSize:11,marginTop:4}}>Solo numeri. Non usare date di nascita o numeri ovvi.</div>
      </div>
      <Inp label="Ruolo" value={form.ruolo} onChange={v=>setForm({...form,ruolo:v})} opts={["addetto","admin"]}/>
      {form.ruolo==="admin"&&<div style={{background:C.gold+"11",border:`1px solid ${C.gold}33`,borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12,color:C.gold}}>⚠️ Gli admin possono gestire addetti e vedere tutte le operazioni.</div>}
      <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
        <Btn outline color={C.muted} onClick={()=>{setShowAdd(false);setEditItem(null);}}>Annulla</Btn>
        <Btn onClick={saveAddetto} disabled={saving}>{saving?<Spinner/>:(editItem?"Salva":"Crea")}</Btn>
      </div>
    </Modal>}
  </div>;
}


// ══════════════════════════════════════════════════════════════════════════
// RISCATTA PREMIO — tab nella Cassa per verificare/confermare riscatti
// ══════════════════════════════════════════════════════════════════════════
function RiscattiPanel({addetto}){
  const[codice,setCodice]=useState("");
  const[found,setFound]=useState(null);   // riscatto trovato
  const[checking,setChecking]=useState(false);
  const[confirming,setConfirming]=useState(false);
  const[msg,setMsg]=useState(null);       // {type:"ok"|"err", text}
  const[recenti,setRecenti]=useState([]);

  useEffect(()=>{loadRecenti();},[]);

  const loadRecenti=async()=>{
    const{data}=await sb.from("riscatti").select("*").eq("status","riscattato").order("riscattato_at",{ascending:false}).limit(20);
    setRecenti(data||[]);
  };

  const cerca=async()=>{
    const c=codice.trim().toUpperCase();
    if(!c)return;
    setChecking(true);setFound(null);setMsg(null);
    const{data,error}=await sb.from("riscatti").select("*").eq("qr_code",c).single();
    setChecking(false);
    if(error||!data){setMsg({type:"err",text:"❌ Codice non trovato o non valido."});return;}
    if(data.status==="riscattato"){setMsg({type:"err",text:`❌ Premio già riscosso il ${data.riscattato_at?.slice(0,10)||"—"} da ${data.riscattato_da||"—"}.`});return;}
    if(data.status==="scaduto"||new Date(data.scade_at)<new Date()){setMsg({type:"err",text:"❌ Questo codice è scaduto."});return;}
    setFound(data);
  };

  const conferma=async()=>{
    if(!found)return;
    setConfirming(true);
    try{
      // 1. Scala punti al cliente
      if(found.customer_id){
        const{data:cl}=await sb.from("clienti").select("points").eq("id",found.customer_id).single();
        if(cl){
          const newPts=Math.max(0,cl.points-found.punti_costo);
          await sb.from("clienti").update({points:newPts,tier:calcTier(newPts)}).eq("id",found.customer_id);
        }
      }
      // 2. Marca riscatto come completato
      await sb.from("riscatti").update({
        status:"riscattato",
        riscattato_at:new Date().toISOString(),
        riscattato_da:addetto?.nome||"admin",
      }).eq("id",found.id);
      setMsg({type:"ok",text:`✅ Premio "${found.premio_nome}" riscattato! −${found.punti_costo} pt a ${found.customer_name||"cliente"}.`});
      setFound(null);setCodice("");
      loadRecenti();
    }catch(e){setMsg({type:"err",text:"Errore: "+e.message});}
    setConfirming(false);
  };

  return <div>
    <div style={{background:C.card,borderRadius:14,padding:20,marginBottom:16}}>
      <div style={{color:C.muted,fontSize:11,textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Codice riscatto</div>
      <input
        value={codice} onChange={e=>{setCodice(e.target.value.toUpperCase());setMsg(null);setFound(null);}}
        onKeyDown={e=>e.key==="Enter"&&cerca()}
        placeholder="RIS-XXXXX-XXXXX"
        style={{width:"100%",background:C.primary,color:C.gold,border:`2px solid ${codice?C.gold:C.border}`,borderRadius:12,padding:"14px 16px",fontSize:16,fontFamily:"monospace",textAlign:"center",letterSpacing:2,boxSizing:"border-box",marginBottom:12}}
      />
      <button onClick={cerca} disabled={!codice.trim()||checking} style={{width:"100%",background:`linear-gradient(135deg,${C.teal},${C.blue})`,border:"none",color:"#fff",borderRadius:10,padding:"13px",fontSize:15,fontWeight:800,cursor:"pointer",opacity:(!codice.trim()||checking)?.5:1}}>
        {checking?<Spinner/>:"🔍 Verifica codice"}
      </button>
    </div>

    {msg&&<div style={{background:(msg.type==="ok"?C.green:C.accent)+"22",border:`1px solid ${(msg.type==="ok"?C.green:C.accent)}44`,borderRadius:12,padding:"14px 16px",marginBottom:16,color:msg.type==="ok"?C.green:C.accent,fontSize:14,fontWeight:600}}>{msg.text}</div>}

    {found&&<div style={{background:C.card,borderRadius:14,padding:20,marginBottom:16,border:`2px solid ${C.gold}44`}}>
      <div style={{fontSize:32,textAlign:"center",marginBottom:12}}>🎁</div>
      <div style={{fontFamily:"monospace",fontSize:11,color:C.dim,textAlign:"center",marginBottom:14,wordBreak:"break-all"}}>{found.qr_code}</div>
      <div style={{display:"grid",gap:8,marginBottom:16}}>
        {[
          ["Cliente",found.customer_name||"—",C.teal],
          ["Premio",found.premio_nome,C.gold],
          ["Costo",`${found.punti_costo} punti`,C.orange],
          ["Scade",found.scade_at?.slice(0,10)||"—",C.muted],
        ].map(([k,v,c])=><div key={k} style={{display:"flex",justifyContent:"space-between",padding:"8px 10px",background:C.primary,borderRadius:8}}>
          <span style={{color:C.muted,fontSize:12}}>{k}</span>
          <span style={{color:c,fontWeight:700,fontSize:13}}>{v}</span>
        </div>)}
      </div>
      <div style={{background:C.gold+"11",border:`1px solid ${C.gold}33`,borderRadius:10,padding:"10px 14px",fontSize:12,color:C.gold,marginBottom:14}}>
        ⚠️ Confermando, verranno scalati <b>{found.punti_costo} punti</b> dal saldo del cliente.
      </div>
      <div style={{display:"flex",gap:10}}>
        <button onClick={()=>{setFound(null);setCodice("");}} style={{flex:1,background:"none",border:`1px solid ${C.muted}44`,color:C.muted,borderRadius:10,padding:"12px",cursor:"pointer",fontWeight:700}}>Annulla</button>
        <button onClick={conferma} disabled={confirming} style={{flex:2,background:`linear-gradient(135deg,${C.green},${C.teal})`,border:"none",color:"#fff",borderRadius:10,padding:"12px",cursor:"pointer",fontWeight:800,fontSize:14,opacity:confirming?.7:1}}>
          {confirming?<Spinner/>:"✅ Conferma riscatto"}
        </button>
      </div>
    </div>}

    {recenti.length>0&&<div>
      <div style={{color:C.muted,fontSize:11,textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Riscatti recenti</div>
      {recenti.map(r=><div key={r.id} style={{background:C.card,borderRadius:10,padding:12,marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{color:C.text,fontSize:13,fontWeight:600}}>{r.premio_nome}</div>
          <div style={{color:C.muted,fontSize:11,marginTop:2}}>{r.customer_name||"—"} · {r.riscattato_at?.slice(0,10)||"—"}</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{color:C.accent,fontWeight:700,fontSize:13}}>−{r.punti_costo} pt</div>
          <div style={{color:C.muted,fontSize:11}}>{r.riscattato_da||"—"}</div>
        </div>
      </div>)}
    </div>}
  </div>;
}

// ══════════════════════════════════════════════════════════════════════════
// CASSA — registra acquisto veloce senza selezionare cliente
// ══════════════════════════════════════════════════════════════════════════
function Cassa({addetto}){
  const{data:camps}=useTable("campagne","id");
  const[cassaTab,setCassaTab]=useState("acquisto");
  const[importo,setImporto]=useState("");
  const[result,setResult]=useState(null);
  const[saving,setSaving]=useState(false);
  const[btStatus,setBtStatus]=useState("disconnected");
  const[btMsg,setBtMsg]=useState("");
  const[printDone,setPrintDone]=useState(false);

  const activeCamp=camps.find(c=>c.active);
  const imp=parseFloat(importo)||0;
  const punti=Math.floor(imp);
  const soglia=activeCamp?Number(activeCamp.trigger_value):20;
  const hasToken=activeCamp&&imp>=soglia;

  const genera=async()=>{
    if(!imp||imp<=0)return;
    setSaving(true);
    const acqId=genAcqID();
    const acqUrl=buildAcquistoURL(acqId);
    let tokenId=null;
    if(hasToken){
      const tk={id:uid(),token:genTK(),customer_id:null,customer_name:"",campaign_id:activeCamp.id,campaign_name:activeCamp.name,created_at:today(),status:"Non giocato",addetto_id:addetto?.id||null,addetto_nome:addetto?.nome||""};
      await sb.from("tokens").insert(tk);
      tokenId=tk.id;
      const stats=typeof activeCamp.stats==="string"?JSON.parse(activeCamp.stats):activeCamp.stats;
      await sb.from("campagne").update({stats:JSON.stringify({...stats,generated:stats.generated+1})}).eq("id",activeCamp.id);
    }
    await sb.from("acquisti").insert({id:acqId,importo:imp,punti,campaign_id:activeCamp?.id||null,token_iw:tokenId,customer_id:null,status:"non_usato",addetto_id:addetto?.id||null,addetto_nome:addetto?.nome||"",created_time:new Date().toISOString()});
    setResult({acqId,acqUrl,punti,importo:imp,hasToken,campagna:activeCamp?.name||""});
    setPrintDone(false);setSaving(false);
  };

  const reset=()=>{setResult(null);setImporto("");setPrintDone(false);setBtMsg("");};

  const connectPrinter=async()=>{
    setBtStatus("connecting");setBtMsg("");
    try{const n=await BTP.connect();setBtStatus("connected");setBtMsg("✅ "+n);}
    catch(e){setBtStatus("error");setBtMsg(e.message);}
  };

  const printAcquisto=async()=>{
    if(!BTP.isConnected()){setBtMsg("Connetti prima la stampante.");return;}
    setBtStatus("printing");
    try{
      const enc=new TextEncoder();const b=[];
      const push=(...a)=>a.forEach(x=>b.push(x));
      const text=s=>enc.encode(s).forEach(x=>b.push(x));
      const ESC=0x1B,GS=0x1D,LF=0x0A;
      push(ESC,0x40);push(ESC,0x61,0x01);
      push(ESC,0x21,0x30);text("CRUNCHCLUB\n");push(ESC,0x21,0x00);
      text("========================\n");
      push(ESC,0x21,0x08);text("Registra il tuo acquisto\n");push(ESC,0x21,0x00);
      text("Data: "+new Date().toLocaleDateString("it-IT")+"\n");
      text("------------------------\n");
      push(ESC,0x61,0x00);
      text("Importo:  \u20ac"+result.importo.toFixed(2)+"\n");
      text("Punti:    +"+result.punti+" pt\n");
      if(result.hasToken)text("Bonus:    1 Gratta e Vinci!\n");
      text("------------------------\n");
      push(ESC,0x61,0x01);
      push(ESC,0x21,0x08);text("Scansiona il QR\n");push(ESC,0x21,0x00);
      text("con il tuo telefono\n\n");
      const qd=enc.encode(result.acqUrl);const ql=qd.length+3;
      push(GS,0x28,0x6B,0x04,0x00,0x31,0x41,0x32,0x00);
      push(GS,0x28,0x6B,0x03,0x00,0x31,0x43,0x07);
      push(GS,0x28,0x6B,0x03,0x00,0x31,0x45,0x30);
      push(GS,0x28,0x6B,ql&0xFF,(ql>>8)&0xFF,0x31,0x50,0x30,...qd);
      push(GS,0x28,0x6B,0x03,0x00,0x31,0x51,0x30);
      push(LF);text("========================\n");
      text("Grazie!\n\n\n");
      push(GS,0x56,0x41,0x03);
      await BTP.write(new Uint8Array(b));
      setBtStatus("connected");setBtMsg("✅ Stampato!");setPrintDone(true);
    }catch(e){setBtStatus("error");setBtMsg("❌ "+e.message);}
  };

  const btCol={disconnected:C.muted,connecting:C.gold,connected:C.green,printing:C.blue,error:C.accent}[btStatus];

  return <div className="fade">
    <div style={{marginBottom:16}}>
      <h2 style={{margin:"0 0 4px",fontSize:20,color:C.text}}>🛒 Cassa</h2>
      <p style={{color:C.muted,fontSize:13}}>Registra acquisti e riscatta premi</p>
    </div>
    <Tabs tabs={["Acquisto","Riscatta Premio"]} active={cassaTab==="acquisto"?"Acquisto":"Riscatta Premio"} onChange={v=>setCassaTab(v==="Acquisto"?"acquisto":"riscatta")}/>

    {cassaTab==="riscatta"&&<RiscattiPanel addetto={addetto}/>}

    {cassaTab==="acquisto"&&(!result?<div style={{maxWidth:420}}>
      {/* Importo */}
      <div style={{background:C.card,borderRadius:16,padding:24,marginBottom:16}}>
        <label style={{color:C.muted,fontSize:11,display:"block",marginBottom:10,textTransform:"uppercase",letterSpacing:.5}}>Importo scontrino (€)</label>
        <input
          type="number" inputMode="decimal" value={importo}
          onChange={e=>setImporto(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&imp>0&&genera()}
          placeholder="0.00" autoFocus
          style={{width:"100%",background:C.primary,color:C.gold,border:`2px solid ${imp>0?C.gold:C.border}`,borderRadius:12,padding:"16px 20px",fontSize:28,fontWeight:800,textAlign:"center",boxSizing:"border-box",transition:"border-color .2s"}}
        />
        {/* Anteprima punti e token */}
        {imp>0&&<div style={{marginTop:16,display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div style={{background:C.primary,borderRadius:10,padding:14,textAlign:"center"}}>
            <div style={{color:C.gold,fontWeight:800,fontSize:20}}>+{punti}</div>
            <div style={{color:C.muted,fontSize:12,marginTop:2}}>punti</div>
          </div>
          <div style={{background:hasToken?C.orange+"22":C.primary,borderRadius:10,padding:14,textAlign:"center",border:hasToken?`1px solid ${C.orange}44`:"none"}}>
            {hasToken
              ?<><div style={{fontSize:20}}>🎰</div><div style={{color:C.orange,fontSize:12,fontWeight:700,marginTop:2}}>Gratta e Vinci!</div></>
              :<><div style={{color:C.dim,fontWeight:700,fontSize:14}}>€{(soglia-imp).toFixed(2)}</div><div style={{color:C.dim,fontSize:11,marginTop:2}}>al Gratta e Vinci</div></>
            }
          </div>
        </div>}
      </div>

      {/* Campagna attiva info */}
      {activeCamp&&<div style={{background:C.primary,borderRadius:10,padding:12,marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{color:C.muted,fontSize:12}}>Campagna attiva</div>
        <div style={{color:C.teal,fontWeight:600,fontSize:13}}>{activeCamp.name}</div>
      </div>}
      {!activeCamp&&<div style={{background:C.accent+"11",border:`1px solid ${C.accent}33`,borderRadius:10,padding:12,marginBottom:16,color:C.accent,fontSize:12}}>
        ⚠️ Nessuna campagna Instant Win attiva — i punti verranno assegnati ma non ci sarà gratta e vinci.
      </div>}

      {/* Addetto loggato */}
      <div style={{background:C.primary,borderRadius:10,padding:12,marginBottom:20,display:"flex",justifyContent:"space-between"}}>
        <span style={{color:C.muted,fontSize:12}}>Addetto</span>
        <span style={{color:C.text,fontWeight:600,fontSize:12}}>👤 {addetto?.nome||"—"}</span>
      </div>

      <button onClick={genera} disabled={!imp||imp<=0||saving} style={{width:"100%",background:imp>0?`linear-gradient(135deg,${C.accent},${C.gold})`:`${C.dim}44`,border:"none",color:imp>0?"#fff":C.dim,borderRadius:14,padding:"18px",fontSize:18,fontWeight:900,cursor:imp>0?"pointer":"not-allowed",transition:"all .2s"}}>
        {saving?<Spinner/>:"⚡ Genera QR →"}
      </button>
    </div>

    :<div style={{maxWidth:420}}>
      <div style={{textAlign:"center",marginBottom:20}}>
        <div style={{fontSize:40,marginBottom:8}}>✅</div>
        <div style={{color:C.text,fontWeight:700,fontSize:18,marginBottom:4}}>QR pronto!</div>
        <div style={{color:C.muted,fontSize:13}}>Mostra al cliente da scansionare</div>
      </div>

      {/* QR Code */}
      <div style={{background:C.card,borderRadius:16,padding:20,marginBottom:16,textAlign:"center"}}>
        <QRSvg value={result.acqUrl} size={220}/>
        <div style={{marginTop:10,color:C.dim,fontSize:10,wordBreak:"break-all"}}>{result.acqUrl}</div>
      </div>

      {/* Riepilogo */}
      <div style={{background:C.card,borderRadius:12,padding:16,marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${C.border}22`}}>
          <span style={{color:C.muted,fontSize:13}}>Importo</span>
          <span style={{color:C.text,fontWeight:700}}>€ {result.importo.toFixed(2)}</span>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:result.hasToken?`1px solid ${C.border}22`:"none"}}>
          <span style={{color:C.muted,fontSize:13}}>Punti cliente</span>
          <span style={{color:C.gold,fontWeight:800}}>+{result.punti} pt</span>
        </div>
        {result.hasToken&&<div style={{display:"flex",justifyContent:"space-between",padding:"6px 0"}}>
          <span style={{color:C.muted,fontSize:13}}>Gratta e Vinci</span>
          <span style={{color:C.orange,fontWeight:700}}>🎰 Incluso</span>
        </div>}
      </div>

      {/* Bluetooth */}
      <div style={{background:C.card,borderRadius:12,padding:16,marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={{color:C.text,fontWeight:700}}>🖨️ Stampa</span>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:btCol,boxShadow:`0 0 6px ${btCol}`}}/>
            <span style={{color:btCol,fontSize:12}}>{{disconnected:"Off",connecting:"…",connected:"✓",printing:"Stampa…",error:"Errore"}[btStatus]}</span>
          </div>
        </div>
        {btMsg&&<div style={{background:btCol+"22",border:`1px solid ${btCol}33`,borderRadius:8,padding:"8px 12px",marginBottom:10,fontSize:12,color:btCol}}>{btMsg}</div>}
        {!navigator.bluetooth&&<div style={{color:C.muted,fontSize:12}}>Stampa disponibile su Chrome Android con HTTPS.</div>}
        {navigator.bluetooth&&<div style={{display:"flex",gap:8}}>
          {(btStatus==="disconnected"||btStatus==="error")&&<button onClick={connectPrinter} style={{flex:1,background:C.teal,color:"#fff",border:"none",borderRadius:8,padding:"10px",cursor:"pointer",fontWeight:700}}>🔗 Connetti</button>}
          {btStatus==="connected"&&<><button onClick={printAcquisto} style={{flex:2,background:`linear-gradient(135deg,${C.gold},${C.orange})`,color:"#000",border:"none",borderRadius:8,padding:"10px",cursor:"pointer",fontWeight:800,fontSize:14}}>🖨️ Stampa</button><button onClick={()=>{BTP.disconnect();setBtStatus("disconnected");setBtMsg("");}} style={{flex:1,background:"none",border:`1px solid ${C.muted}44`,color:C.muted,borderRadius:8,padding:"10px",cursor:"pointer",fontSize:12}}>✕</button></>}
          {btStatus==="printing"&&<div style={{flex:1,background:C.blue+"22",borderRadius:8,padding:"10px",textAlign:"center",color:C.blue}}>⏳</div>}
        </div>}
        {printDone&&<div style={{marginTop:8,background:C.green+"22",border:`1px solid ${C.green}33`,borderRadius:8,padding:"8px 12px",fontSize:12,color:C.green}}>✅ Bigliettino stampato!</div>}
      </div>

      <div style={{background:C.accent+"11",border:`1px solid ${C.accent}33`,borderRadius:10,padding:12,marginBottom:16,fontSize:12,color:C.muted}}>
        ⚠️ QR <b style={{color:C.text}}>monouso</b> — bruciato automaticamente dopo la prima scansione.
      </div>

      <button onClick={reset} style={{width:"100%",background:`linear-gradient(135deg,${C.accent},${C.gold})`,border:"none",color:"#fff",borderRadius:14,padding:"16px",fontSize:16,fontWeight:800,cursor:"pointer"}}>
        ⚡ Nuovo acquisto
      </button>
    </div>)}
  </div>;
}

// ── LOGIN ADDETTO ─────────────────────────────────────────────────────────
function LoginAddetto({onLogin}){
  const[nome,setNome]=useState("");
  const[pin,setPin]=useState("");
  const[err,setErr]=useState("");
  const[loading,setLoading]=useState(false);

  const login=async()=>{
    if(!nome.trim()||!pin.trim()){setErr("Inserisci nome e PIN.");return;}
    if(!/^\d+$/.test(pin)){setErr("Il PIN deve contenere solo numeri.");return;}
    setLoading(true);setErr("");
    const{data,error}=await sb.from("addetti").select("*").eq("pin",pin).eq("attivo",true).single();
    if(error||!data){setErr("PIN non valido.");setLoading(false);return;}
    if(!data.nome.toLowerCase().includes(nome.trim().toLowerCase())&&!nome.trim().toLowerCase().includes(data.nome.toLowerCase().split(" ")[0].toLowerCase())){
      setErr("Nome o PIN non corrispondono.");setLoading(false);return;
    }
    onLogin(data);setLoading(false);
  };

  return <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
    <div style={{width:"100%",maxWidth:360,textAlign:"center"}}>
      <div style={{width:72,height:72,margin:"0 auto 20px",background:`linear-gradient(135deg,${C.accent},${C.gold})`,borderRadius:20,display:"flex",alignItems:"center",justifyContent:"center",fontSize:34}}>🏆</div>
      <h1 style={{color:C.text,fontSize:22,fontWeight:900,margin:"0 0 4px"}}>CrunchClub</h1>
      <p style={{color:C.muted,fontSize:13,marginBottom:32}}>Gestionale — accesso riservato</p>
      {err&&<div style={{background:C.accent+"22",border:`1px solid ${C.accent}44`,borderRadius:10,padding:"10px 14px",color:C.accent,fontSize:13,marginBottom:16,textAlign:"left"}}>{err}</div>}
      <div style={{marginBottom:14,textAlign:"left"}}>
        <label style={{color:C.muted,fontSize:11,display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:.5}}>Il tuo nome</label>
        <input value={nome} onChange={e=>setNome(e.target.value)} placeholder="Es. Mario" style={{width:"100%",background:C.card,color:C.text,border:`1px solid ${C.border}`,borderRadius:12,padding:"13px 16px",fontSize:15,boxSizing:"border-box"}}/>
      </div>
      <div style={{marginBottom:20,textAlign:"left"}}>
        <label style={{color:C.muted,fontSize:11,display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:.5}}>PIN numerico</label>
        <input type="password" inputMode="numeric" pattern="[0-9]*" value={pin} onChange={e=>setPin(e.target.value.replace(/\D/g,""))} onKeyDown={e=>e.key==="Enter"&&login()} placeholder="••••" maxLength={8} style={{width:"100%",background:C.card,color:C.text,border:`1px solid ${C.border}`,borderRadius:12,padding:"13px 16px",fontSize:20,letterSpacing:6,textAlign:"center",boxSizing:"border-box"}}/>
      </div>
      <button onClick={login} disabled={loading} style={{width:"100%",background:`linear-gradient(135deg,${C.accent},${C.gold})`,border:"none",color:"#fff",borderRadius:14,padding:"15px",fontSize:16,fontWeight:800,cursor:"pointer",opacity:loading?.7:1}}>
        {loading?<Spinner/>:"Accedi →"}
      </button>
    </div>
  </div>;
}

function App(){
  const[section,setSection]=useState("dashboard");
  const[menuOpen,setMenuOpen]=useState(false);
  const[seeded,setSeeded]=useState(false);
  const[connErr,setConnErr]=useState("");
  const[addetto,setAddetto]=useState(()=>{
    try{const s=sessionStorage.getItem("flp_addetto");return s?JSON.parse(s):null;}catch{return null;}
  });

  useEffect(()=>{
    seedIfEmpty()
      .then(()=>setSeeded(true))
      .catch(e=>setConnErr("Errore connessione Supabase: "+e.message));
  },[]);

  const loginAddetto=(a)=>{setAddetto(a);sessionStorage.setItem("flp_addetto",JSON.stringify(a));};
  const logoutAddetto=()=>{setAddetto(null);sessionStorage.removeItem("flp_addetto");};

  const current=NAV.find(n=>n.id===section);

  const render=()=>{
    switch(section){
      case "dashboard": return <Dashboard/>;
      case "cassa":     return <Cassa addetto={addetto}/>;
      case "clienti":   return <Clienti addetto={addetto}/>;
      case "instantwin":return <InstantWin addetto={addetto}/>;
      case "giftcard":  return <GiftCards/>;
      case "menu":      return <MenuDigitale/>;
      case "notifiche": return <Notifiche/>;
      case "segmenti":  return <Segmentazione/>;
      case "premi":     return <PremiCatalogo/>;
      case "addetti":   return <Addetti addetto={addetto}/>;
      default:          return <Dashboard/>;
    }
  };

  if(!seeded&&!connErr)return <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
    <Spinner/>
    <div style={{color:C.muted,fontSize:14}}>Connessione a Supabase…</div>
  </div>;

  if(connErr)return <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
    <div style={{background:C.card,borderRadius:16,padding:28,maxWidth:400,textAlign:"center"}}>
      <div style={{fontSize:40,marginBottom:12}}>⚠️</div>
      <div style={{color:C.accent,fontWeight:700,marginBottom:8}}>Errore di connessione</div>
      <div style={{color:C.muted,fontSize:13,lineHeight:1.6}}>{connErr}</div>
      <button onClick={()=>window.location.reload()} style={{marginTop:16,background:C.accent,color:"#fff",border:"none",borderRadius:10,padding:"10px 24px",cursor:"pointer",fontWeight:700}}>Riprova</button>
    </div>
  </div>;

  // Login addetto obbligatorio
  if(!addetto)return <LoginAddetto onLogin={loginAddetto}/>;

  return <div style={{minHeight:"100vh",background:C.bg}}>
    {/* Top bar */}
    <div style={{background:C.primary,borderBottom:`1px solid ${C.border}`,padding:"12px 16px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:50}}>
      <button onClick={()=>setMenuOpen(!menuOpen)} style={{background:"none",border:"none",color:C.text,fontSize:22,cursor:"pointer",padding:4,lineHeight:1}}>☰</button>
      <div style={{width:30,height:30,background:`linear-gradient(135deg,${C.accent},${C.gold})`,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>🏆</div>
      <div style={{flex:1}}>
        <div style={{fontWeight:800,fontSize:14,color:C.text}}>CrunchClub</div>
        <div style={{fontSize:11,color:C.muted}}>{current?.icon} {current?.label}</div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <div style={{display:"flex",alignItems:"center",gap:5}}>
          <div style={{width:7,height:7,borderRadius:"50%",background:C.green,boxShadow:`0 0 5px ${C.green}`}}/>
          <span style={{color:C.muted,fontSize:10}}>live</span>
        </div>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:20,padding:"3px 10px",display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:11}}>👤</span>
          <span style={{color:C.text,fontSize:11,fontWeight:600}}>{addetto?.nome}</span>
          <button onClick={logoutAddetto} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:11,padding:0,marginLeft:2}}>✕</button>
        </div>
      </div>
    </div>

    {/* Drawer menu */}
    {menuOpen&&<div style={{position:"fixed",inset:0,zIndex:100,display:"flex"}} onClick={()=>setMenuOpen(false)}>
      <div style={{width:"min(260px,80vw)",background:C.surface,borderRight:`1px solid ${C.border}`,padding:"20px 10px",height:"100%",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{padding:"0 10px 16px",marginBottom:8,borderBottom:`1px solid ${C.border}`}}>
          <div style={{fontWeight:800,fontSize:15,color:C.text}}>CrunchClub</div>
          <div style={{fontSize:11,color:C.muted}}>CrunchClub · Supabase</div>
        </div>
        {NAV.filter(n=>!n.adminOnly||addetto?.ruolo==="admin").map(n=><button key={n.id} onClick={()=>{setSection(n.id);setMenuOpen(false);}} style={{display:"flex",alignItems:"center",gap:12,width:"100%",background:section===n.id?C.accent+"20":"none",border:section===n.id?`1px solid ${C.accent}33`:"1px solid transparent",borderRadius:8,padding:"10px 14px",cursor:"pointer",marginBottom:4,color:section===n.id?C.accent:C.muted,fontWeight:section===n.id?700:400,fontSize:14}}>
          <span style={{fontSize:18}}>{n.icon}</span>{n.label}
        </button>)}
      </div>
    </div>}

    {/* Content */}
    <div style={{padding:"18px 16px",maxWidth:900,margin:"0 auto"}}>
      {render()}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
