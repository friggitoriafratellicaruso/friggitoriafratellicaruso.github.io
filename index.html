// ── BLUETOOTH PRINTER ─────────────────────────────────────────────────────
const BTP={
  device:null,char:null,
  UUIDS:["000018f0-0000-1000-8000-00805f9b34fb","e7810a71-73ae-499d-8c15-faa9aef0c3f2","49535343-fe7d-4ae5-8fa9-9fafd205e455","0000ff00-0000-1000-8000-00805f9b34fb"],
  async connect(){
    if(!navigator.bluetooth)throw new Error("Usa Chrome su Android con HTTPS.");
    const dev=await navigator.bluetooth.requestDevice({acceptAllDevices:true,optionalServices:this.UUIDS});
    const srv=await dev.gatt.connect();
    let svc=null;for(const u of this.UUIDS){try{svc=await srv.getPrimaryService(u);break}catch{}}
    if(!svc)throw new Error("Stampante non riconosciuta.");
    const chars=await svc.getCharacteristics();
    this.char=chars.find(c=>c.properties.write||c.properties.writeWithoutResponse);
    if(!this.char)throw new Error("Caratteristica scrittura non trovata.");
    this.device=dev;return dev.name||"Connessa";
  },
  disconnect(){if(this.device?.gatt?.connected)this.device.gatt.disconnect();this.device=null;this.char=null;},
  isConnected(){return!!(this.device?.gatt?.connected&&this.char);},
  async write(data){
    if(!this.char)throw new Error("Non connessa.");
    const CHUNK=512;
    for(let i=0;i<data.length;i+=CHUNK){
      const c=data.slice(i,i+CHUNK);
      if(this.char.properties.writeWithoutResponse)await this.char.writeValueWithoutResponse(c);
      else await this.char.writeValue(c);
      await new Promise(r=>setTimeout(r,20));
    }
  },
  buildReceipt(d){
    const enc=new TextEncoder();const b=[];
    const push=(...a)=>a.forEach(x=>b.push(x));
    const text=s=>enc.encode(s).forEach(x=>b.push(x));
    const ESC=0x1B,GS=0x1D,LF=0x0A;
    push(ESC,0x40);push(ESC,0x61,0x01);
    push(ESC,0x21,0x30);text("CRUNCHCLUB\n");push(ESC,0x21,0x00);
    text("========================\n");
    push(ESC,0x21,0x08);text(d.campaignName+"\n");push(ESC,0x21,0x00);
    text("Data: "+d.date+"\n");text("Valido 30 giorni\n");
    text("------------------------\n");
    push(ESC,0x61,0x00);push(ESC,0x21,0x08);text("Cliente:\n");push(ESC,0x21,0x00);
    text(d.customerName+"\n\n");
    push(ESC,0x61,0x01);push(ESC,0x21,0x08);text("TOKEN:\n");push(ESC,0x21,0x00);
    push(ESC,0x21,0x30);text(d.token+"\n");push(ESC,0x21,0x00);
    text("------------------------\n");
    const qd=enc.encode(d.playUrl);const ql=qd.length+3;
    push(ESC,0x61,0x01);
    push(GS,0x28,0x6B,0x04,0x00,0x31,0x41,0x32,0x00);
    push(GS,0x28,0x6B,0x03,0x00,0x31,0x43,0x06);
    push(GS,0x28,0x6B,0x03,0x00,0x31,0x45,0x30);
    push(GS,0x28,0x6B,ql&0xFF,(ql>>8)&0xFF,0x31,0x50,0x30,...qd);
    push(GS,0x28,0x6B,0x03,0x00,0x31,0x51,0x30);
    push(LF);text("app.miolocale.it/gioca\n");
    text("========================\n");
    push(ESC,0x61,0x01);text("Buona fortuna!\n\n\n");
    push(GS,0x56,0x41,0x03);
    return new Uint8Array(b);
  }
};

// ── SUPABASE HOOKS ────────────────────────────────────────────────────────
function useTable(table,order="id"){
  const [data,setData]=useState([]);
  const [loading,setLoading]=useState(true);
  const [err,setErr]=useState("");

  const load=useCallback(async()=>{
    setLoading(true);setErr("");
    const {data:rows,error}=await sb.from(table).select("*").order(order,{ascending:true});
    if(error){setErr(error.message);}else{setData(rows||[]);}
    setLoading(false);
  },[table,order]);

  useEffect(()=>{load();},[load]);

  // Realtime subscription
  useEffect(()=>{
    const ch=sb.channel("rt_"+table)
      .on("postgres_changes",{event:"*",schema:"public",table},(payload)=>{
        if(payload.eventType==="INSERT")setData(prev=>[...prev,payload.new]);
        if(payload.eventType==="UPDATE")setData(prev=>prev.map(r=>r.id===payload.new.id?payload.new:r));
        if(payload.eventType==="DELETE")setData(prev=>prev.filter(r=>r.id!==payload.old.id));
      })
      .subscribe();
    return()=>sb.removeChannel(ch);
  },[table]);

  const insert=async(row)=>{
    const {data:inserted,error}=await sb.from(table).insert(row).select().single();
    if(error)throw error;
    return inserted;
  };
  const update=async(id,row)=>{
    const {data:updated,error}=await sb.from(table).update(row).eq("id",id).select().single();
    if(error)throw error;
    return updated;
  };
  const remove=async(id)=>{
    const {error}=await sb.from(table).delete().eq("id",id);
    if(error)throw error;
  };
  const upsert=async(row,conflict="id")=>{
    const {data:upserted,error}=await sb.from(table).upsert(row,{onConflict:conflict}).select().single();
    if(error)throw error;
    return upserted;
  };

  return{data,setData,loading,err,load,insert,update,remove,upsert};
}

      {camps.filter(c=>c.active).length===0&&<div style={{color:C.muted,fontSize:13}}>Nessuna campagna attiva</div>}
      {camps.filter(c=>c.active).map(camp=>{
        const stats=typeof camp.stats==="string"?JSON.parse(camp.stats):camp.stats;
        return <div key={camp.id}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{color:C.text,fontWeight:600}}>{camp.name}</span><span style={{color:C.muted,fontSize:12}}>{camp.start_date} → {camp.end_date}</span></div>
          <div style={{display:"flex",gap:16,marginBottom:8}}>
            {[["Token",stats.generated,C.blue],["Giocati",stats.played,C.teal],["Vincitori",stats.won,C.green]].map(([l,v,c])=><div key={l} style={{textAlign:"center"}}>
              <div style={{color:c,fontWeight:800,fontSize:17}}>{v}</div><div style={{color:C.muted,fontSize:10}}>{l}</div>
            </div>)}
          </div>
          <Bar val={stats.played} max={Math.max(stats.generated,1)} color={C.gold}/>
        </div>;
      })}
    </div>
  </div>;
}

// ══════════════════════════════════════════════════════════════════════════
// CLIENTI
// ══════════════════════════════════════════════════════════════════════════
function Clienti({addetto}){
  const{data:customers,loading,err,insert,update,remove}=useTable("clienti","name");
  const{data:camps}=useTable("campagne","id");
  const[search,setSearch]=useState("");
  const[filterSeg,setFilterSeg]=useState("Tutti");
  const[sel,setSel]=useState(null);
  const[showAdd,setShowAdd]=useState(false);
  const[editMode,setEditMode]=useState(false);
  const[ptModal,setPtModal]=useState(null);
  const[tokenModal,setTokenModal]=useState(null);
  const[genToken_,setGenToken_]=useState(null);
  const[form,setForm]=useState({name:"",email:"",phone:"",birthday:"",segment:"Nuovo",notes:""});
  const[ptAmt,setPtAmt]=useState("");
  const[saving,setSaving]=useState(false);
  const[formErr,setFormErr]=useState("");
  const[btStatus,setBtStatus]=useState("disconnected");
  const[btMsg,setBtMsg]=useState("");
  const[printDone,setPrintDone]=useState(false);
  const[acqModal,setAcqModal]=useState(null);
  const[acqImporto,setAcqImporto]=useState("");
  const[acqResult,setAcqResult]=useState(null);
  const[acqSaving,setAcqSaving]=useState(false);

  const activeCamps=camps.filter(c=>c.active);
  const filtered=customers
    .filter(c=>filterSeg==="Tutti"||c.segment===filterSeg)
    .filter(c=>c.name.toLowerCase().includes(search.toLowerCase())||c.email.toLowerCase().includes(search.toLowerCase()));

  const saveCustomer=async()=>{
    if(!form.name||!form.email){setFormErr("Nome e email obbligatori.");return;}
    setSaving(true);setFormErr("");
    try{
      if(editMode&&sel){
        await update(sel.id,{...form,tier:calcTier(sel.points)});
        setSel(null);
      }else{
        await insert({...form,tier:"Bronze",points:0,spent:0,visits:0,last_visit:today(),join_date:today(),referrals:0,cashback:0,tags:[],addetto_registrazione:addetto?.nome||""});
      }
      setShowAdd(false);setEditMode(false);setForm({name:"",email:"",phone:"",birthday:"",segment:"Nuovo",notes:""});
    }catch(e){setFormErr(e.message);}
    setSaving(false);
  };

  const applyPts=async()=>{
    const amt=parseInt(ptAmt);if(!amt)return;
    const c=customers.find(x=>x.id===ptModal);
    const np=Math.max(0,c.points+amt);
    await update(ptModal,{points:np,tier:calcTier(np)});
    setPtModal(null);setPtAmt("");
  };

  const doGenToken=async(customer,campaign)=>{
    const tk={id:uid(),token:genTK(),customer_id:customer.id,customer_name:customer.name,campaign_id:campaign.id,campaign_name:campaign.name,created_at:today(),status:"Non giocato",addetto_id:addetto?.id||null,addetto_nome:addetto?.nome||""};
    const{error}=await sb.from("tokens").insert(tk);
    if(error){alert("Errore: "+error.message);return;}
    // update campaign stats
    const stats=typeof campaign.stats==="string"?JSON.parse(campaign.stats):campaign.stats;
    await sb.from("campagne").update({stats:JSON.stringify({...stats,generated:stats.generated+1})}).eq("id",campaign.id);
    setGenToken_(tk);setPrintDone(false);
  };


  const doAcquisto=async()=>{
    const imp=parseFloat(acqImporto);
    if(!imp||imp<=0||!acqModal)return;
    setAcqSaving(true);
    const punti=Math.floor(imp);
    const acqId=genAcqID();
    const acqUrl=buildAcquistoURL(acqId);
    const campAttiva=activeCamps[0]||null;
    const hasToken=campAttiva&&imp>=campAttiva.trigger_value;
    let tokenId=null;
    if(hasToken){
      const tk={id:uid(),token:genTK(),customer_id:acqModal.id,customer_name:acqModal.name,campaign_id:campAttiva.id,campaign_name:campAttiva.name,created_at:today(),status:"Non giocato"};
      await sb.from("tokens").insert(tk);
      tokenId=tk.id;
      const stats=typeof campAttiva.stats==="string"?JSON.parse(campAttiva.stats):campAttiva.stats;
      await sb.from("campagne").update({stats:JSON.stringify({...stats,generated:stats.generated+1})}).eq("id",campAttiva.id);
    }
    await sb.from("acquisti").insert({id:acqId,importo:imp,punti,campaign_id:campAttiva?.id||null,token_iw:tokenId,customer_id:null,status:"non_usato",addetto_id:addetto?.id||null,addetto_nome:addetto?.nome||""});
    setAcqResult({acqId,acqUrl,punti,importo:imp,hasToken,campagna:campAttiva?.name||""});
    setAcqSaving(false);
  };

  const connectPrinter=async()=>{
    setBtStatus("connecting");setBtMsg("");
    try{const n=await BTP.connect();setBtStatus("connected");setBtMsg("✅ "+n);}
    catch(e){setBtStatus("error");setBtMsg(e.message);}
  };
  const printAcquisto=async(acq)=>{
    if(!BTP.isConnected()){setBtMsg("Connetti prima.");return;}
    setBtStatus("printing");
    try{
      const enc=new TextEncoder();const b=[];
      const push=(...a)=>a.forEach(x=>b.push(x));
      const text=s=>enc.encode(s).forEach(x=>b.push(x));
      const ESC=0x1B,GS=0x1D,LF=0x0A;
      push(ESC,0x40);push(ESC,0x61,0x01);
      push(ESC,0x21,0x30);text("CRUNCHCLUB\n");push(ESC,0x21,0x00);
      text("========================\n");
      push(ESC,0x21,0x08);text("Registra il tuo acquisto\n");push(ESC,0x21,0x00);
      text("Data: "+new Date().toLocaleDateString("it-IT")+"\n");
      text("------------------------\n");
      push(ESC,0x61,0x00);
      text("Importo:  \u20ac "+acq.importo.toFixed(2)+"\n");
      text("Punti:    +"+acq.punti+" pt\n");
      if(acq.hasToken)text("Bonus:    1 Gratta e Vinci!\n");
      text("------------------------\n");
      push(ESC,0x61,0x01);
      push(ESC,0x21,0x08);text("Scansiona il QR\n");push(ESC,0x21,0x00);
      text("con il tuo telefono\n\n");
      // QR code via ESC/POS
      const qd=enc.encode(acq.acqUrl);const ql=qd.length+3;
      push(GS,0x28,0x6B,0x04,0x00,0x31,0x41,0x32,0x00);
      push(GS,0x28,0x6B,0x03,0x00,0x31,0x43,0x07);
      push(GS,0x28,0x6B,0x03,0x00,0x31,0x45,0x30);
      push(GS,0x28,0x6B,ql&0xFF,(ql>>8)&0xFF,0x31,0x50,0x30,...qd);
      push(GS,0x28,0x6B,0x03,0x00,0x31,0x51,0x30);
      push(LF);
      text("========================\n");
      text("Grazie!\n\n\n");
      push(GS,0x56,0x41,0x03);
      await BTP.write(new Uint8Array(b));
      setBtStatus("connected");setBtMsg("\u2705 Stampato!");setPrintDone(true);
    }catch(e){setBtStatus("error");setBtMsg("\u274C "+e.message);}
  };

  const printToken=async(tk)=>{
    if(!BTP.isConnected()){setBtMsg("Connetti prima.");return;}
    setBtStatus("printing");
    try{
      await BTP.write(BTP.buildReceipt({token:tk.token,campaignName:tk.campaign_name,customerName:tk.customer_name,date:new Date().toLocaleDateString("it-IT"),playUrl:`https://friggitoriafratellicaruso.github.io/crunchclub?t=${tk.token}`}));
      setBtStatus("connected");setBtMsg("✅ Stampato!");setPrintDone(true);
    }catch(e){setBtStatus("error");setBtMsg("❌ "+e.message);}
  };
  const btCol={disconnected:C.muted,connecting:C.gold,connected:C.green,printing:C.blue,error:C.accent}[btStatus];

  if(loading)return <Loading/>;
  return <div className="fade">
    <SH title="Clienti" sub={`${customers.length} totali`} action="+ Nuovo" onAction={()=>{setForm({name:"",email:"",phone:"",birthday:"",segment:"Nuovo",notes:""});setEditMode(false);setShowAdd(true);}}/>
    <ErrBox msg={err}/>
    <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Nome o email…" style={{flex:"1 1 180px",background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 14px",color:C.text,fontSize:13}}/>
      {["Tutti","VIP","Regolare","Nuovo","A rischio"].map(s=><button key={s} onClick={()=>setFilterSeg(s)} style={{background:filterSeg===s?segColor(s):C.card,color:filterSeg===s?"#fff":C.muted,border:"none",borderRadius:20,padding:"6px 12px",cursor:"pointer",fontSize:12,fontWeight:filterSeg===s?700:400}}>{s}</button>)}
    </div>
    <div style={{display:"grid",gap:10}}>
      {filtered.map(c=><div key={c.id} style={{background:C.card,borderRadius:12,padding:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
          <div><div style={{fontWeight:700,color:C.text,fontSize:15}}>{c.name}</div><div style={{color:C.muted,fontSize:12}}>{c.email}</div></div>
          <Badge text={c.tier} color={tierColor(c.tier)}/>
        </div>
        <div style={{display:"flex",gap:12,marginBottom:10}}>
          <div style={{textAlign:"center"}}><div style={{color:C.gold,fontWeight:800}}>{fmt(c.points)}</div><div style={{color:C.muted,fontSize:10}}>punti</div></div>
          <div style={{textAlign:"center"}}><div style={{color:C.green,fontWeight:700}}>{fmtE(c.spent)}</div><div style={{color:C.muted,fontSize:10}}>speso</div></div>
          <div style={{textAlign:"center"}}><div style={{color:C.blue,fontWeight:700}}>{c.visits}</div><div style={{color:C.muted,fontSize:10}}>visite</div></div>
          <div style={{marginLeft:"auto"}}><Badge text={c.segment} color={segColor(c.segment)}/></div>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          <Btn sm color={C.teal} onClick={()=>setSel(c)}>Dettagli</Btn>
          <Btn sm color={C.gold} outline onClick={()=>setPtModal(c.id)}>+Pt</Btn>
          <Btn sm color={C.green} onClick={()=>{setAcqModal(c);setAcqImporto("");setAcqResult(null);}}>💳 Acquisto</Btn>
          {activeCamps.length>0&&<Btn sm color={C.orange} onClick={()=>{setTokenModal({customer:c,campaign:activeCamps[0]});setGenToken_(null);}}>🎰 Token</Btn>}
        </div>
      </div>)}
      {filtered.length===0&&<div style={{background:C.card,borderRadius:12,padding:28,textAlign:"center",color:C.muted}}>Nessun cliente trovato</div>}
    </div>

    {/* ADD/EDIT */}
    {showAdd&&<Modal title={editMode?"✏️ Modifica":"👤 Nuovo cliente"} onClose={()=>setShowAdd(false)}>
      <ErrBox msg={formErr}/>
      <Inp label="Nome" value={form.name} onChange={v=>setForm({...form,name:v})} req/>
      <Inp label="Email" value={form.email} onChange={v=>setForm({...form,email:v})} req/>
      <Inp label="Telefono" value={form.phone} onChange={v=>setForm({...form,phone:v})}/>
      <Inp label="Compleanno" value={form.birthday} onChange={v=>setForm({...form,birthday:v})} type="date"/>
      <Inp label="Segmento" value={form.segment} onChange={v=>setForm({...form,segment:v})} opts={["Nuovo","Regolare","VIP","A rischio"]}/>
      <Inp label="Note" value={form.notes} onChange={v=>setForm({...form,notes:v})}/>
      <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
        <Btn outline color={C.muted} onClick={()=>setShowAdd(false)}>Annulla</Btn>
        <Btn onClick={saveCustomer} disabled={saving}>{saving?<Spinner/>:(editMode?"Salva":"Crea")}</Btn>
      </div>
    </Modal>}

    {/* PUNTI */}
    {ptModal&&<Modal title="⭐ Punti" onClose={()=>setPtModal(null)}>
      <Inp label="Punti (negativo per sottrarre)" value={ptAmt} onChange={setPtAmt} type="number"/>
      <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
        <Btn outline color={C.muted} onClick={()=>setPtModal(null)}>Annulla</Btn>
        <Btn onClick={applyPts} color={C.gold}>Conferma</Btn>
      </div>
    </Modal>}

    {/* TOKEN */}

    {/* MODAL ACQUISTO */}
    {acqModal&&<Modal title="💳 Registra Acquisto" onClose={()=>{setAcqModal(null);setAcqResult(null);setAcqImporto("");}}>
      {!acqResult?<div>
        <div style={{background:C.primary,borderRadius:10,padding:14,marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{color:C.muted}}>Cliente</span>
          <span style={{color:C.gold,fontWeight:700}}>{acqModal.name}</span>
        </div>
        <Inp label="Importo scontrino (€)" value={acqImporto} onChange={setAcqImporto} type="number" placeholder="Es. 42.50" req/>
        {acqImporto&&parseFloat(acqImporto)>0&&<div style={{background:C.primary,borderRadius:10,padding:14,marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
            <span style={{color:C.muted,fontSize:13}}>Punti assegnati</span>
            <span style={{color:C.gold,fontWeight:700}}>+{Math.floor(parseFloat(acqImporto))} pt</span>
          </div>
          {activeCamps[0]&&parseFloat(acqImporto)>=activeCamps[0].trigger_value&&<div style={{display:"flex",justifyContent:"space-between"}}>
            <span style={{color:C.muted,fontSize:13}}>Gratta e Vinci</span>
            <span style={{color:C.orange,fontWeight:700}}>🎰 1 token generato</span>
          </div>}
          {activeCamps[0]&&parseFloat(acqImporto)<activeCamps[0].trigger_value&&<div style={{color:C.dim,fontSize:12}}>
            Mancano €{(activeCamps[0].trigger_value-parseFloat(acqImporto)).toFixed(2)} per il Gratta e Vinci
          </div>}
        </div>}
        <div style={{background:C.teal+"11",border:`1px solid ${C.teal}33`,borderRadius:10,padding:12,marginBottom:16,fontSize:12,color:C.muted,lineHeight:1.6}}>
          💡 Verrà generato un <b style={{color:C.text}}>QR monouso</b>. Il cliente lo scansiona, inserisce la sua email e riceve punti e token automaticamente.
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <Btn outline color={C.muted} onClick={()=>{setAcqModal(null);setAcqImporto("");}}>Annulla</Btn>
          <Btn onClick={doAcquisto} disabled={!acqImporto||parseFloat(acqImporto)<=0||acqSaving} color={C.green}>
            {acqSaving?<Spinner/>:"Genera QR →"}
          </Btn>
        </div>
      </div>:<div style={{textAlign:"center"}}>
        <div style={{fontSize:40,marginBottom:8}}>✅</div>
        <div style={{color:C.text,fontWeight:700,fontSize:16,marginBottom:4}}>QR pronto!</div>
        <div style={{color:C.muted,fontSize:13,marginBottom:14}}>Mostralo al cliente da scansionare</div>

        {/* QR CODE */}
        <div style={{background:C.primary,borderRadius:14,padding:20,marginBottom:14}}>
          <QRSvg value={acqResult.acqUrl} size={200}/>
          <div style={{marginTop:10,color:C.muted,fontSize:10,wordBreak:"break-all"}}>{acqResult.acqUrl}</div>
        </div>

        {/* RIEPILOGO */}
        <div style={{background:C.primary,borderRadius:10,padding:14,marginBottom:14,textAlign:"left"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <span style={{color:C.muted,fontSize:13}}>Importo</span>
            <span style={{color:C.text,fontWeight:600}}>€ {acqResult.importo.toFixed(2)}</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:acqResult.hasToken?6:0}}>
            <span style={{color:C.muted,fontSize:13}}>Punti</span>
            <span style={{color:C.gold,fontWeight:700}}>+{acqResult.punti} pt</span>
          </div>
          {acqResult.hasToken&&<div style={{display:"flex",justifyContent:"space-between"}}>
            <span style={{color:C.muted,fontSize:13}}>Gratta e Vinci</span>
            <span style={{color:C.orange,fontWeight:700}}>🎰 1 token</span>
          </div>}
        </div>

        {/* BLUETOOTH PRINT */}
        <div style={{background:C.primary,borderRadius:12,padding:16,marginBottom:14,textAlign:"left"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <span style={{color:C.text,fontWeight:700}}>🖨️ Stampa bigliettino</span>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:btCol,boxShadow:`0 0 6px ${btCol}`}}/>
              <span style={{color:btCol,fontSize:12}}>{{disconnected:"Off",connecting:"…",connected:"✓ Connessa",printing:"Stampa…",error:"Errore"}[btStatus]}</span>
            </div>
          </div>
          {btMsg&&<div style={{background:btCol+"22",border:`1px solid ${btCol}33`,borderRadius:8,padding:"8px 12px",marginBottom:10,fontSize:12,color:btCol,whiteSpace:"pre-line"}}>{btMsg}</div>}
          {!navigator.bluetooth&&<div style={{background:C.accent+"22",border:`1px solid ${C.accent}33`,borderRadius:8,padding:"10px 12px",fontSize:12,color:C.accent}}>⚠️ Usa Chrome su Android + HTTPS per la stampa.</div>}
          {navigator.bluetooth&&<div style={{display:"flex",gap:8}}>
            {(btStatus==="disconnected"||btStatus==="error")&&<button onClick={connectPrinter} style={{flex:1,background:C.teal,color:"#fff",border:"none",borderRadius:8,padding:"10px",cursor:"pointer",fontWeight:700,fontSize:13}}>🔗 Connetti</button>}
            {btStatus==="connected"&&<><button onClick={()=>printAcquisto(acqResult)} style={{flex:2,background:`linear-gradient(135deg,${C.gold},${C.orange})`,color:"#000",border:"none",borderRadius:8,padding:"10px",cursor:"pointer",fontWeight:800}}>🖨️ Stampa ora</button><button onClick={()=>{BTP.disconnect();setBtStatus("disconnected");setBtMsg("");}} style={{flex:1,background:"none",border:`1px solid ${C.muted}44`,color:C.muted,borderRadius:8,padding:"10px",cursor:"pointer",fontSize:12}}>✕</button></>}
            {btStatus==="printing"&&<div style={{flex:1,background:C.blue+"22",borderRadius:8,padding:"10px",textAlign:"center",color:C.blue,fontSize:13}}>⏳</div>}
          </div>}
          {printDone&&<div style={{marginTop:8,background:C.green+"22",border:`1px solid ${C.green}33`,borderRadius:8,padding:"8px 12px",fontSize:12,color:C.green}}>✅ Bigliettino stampato!</div>}
        </div>

        {acqResult.hasToken&&<div style={{background:C.orange+"11",border:`1px solid ${C.orange}33`,borderRadius:10,padding:12,marginBottom:14,fontSize:13,color:C.orange,textAlign:"left"}}>
          🎰 Il cliente troverà il Gratta e Vinci nella sezione "Gioca" dell'app dopo la scansione.
        </div>}
        <div style={{background:C.accent+"11",border:`1px solid ${C.accent}33`,borderRadius:10,padding:10,marginBottom:14,fontSize:12,color:C.muted,textAlign:"left"}}>
          ⚠️ QR <b style={{color:C.text}}>monouso</b> — bruciato dopo la prima scansione.
        </div>
        <Btn full onClick={()=>{setAcqModal(null);setAcqResult(null);setAcqImporto("");setPrintDone(false);}}>Chiudi</Btn>
      </div>}
    </Modal>}

    {tokenModal&&<Modal title="🎰 Genera Token" onClose={()=>{setTokenModal(null);setGenToken_(null);setPrintDone(false);}}>
      {!genToken_?<div>
        <div style={{background:C.primary,borderRadius:10,padding:14,marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{color:C.muted}}>Cliente</span><span style={{color:C.gold,fontWeight:700}}>{tokenModal.customer.name}</span></div>
          <div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:C.muted}}>Campagna</span><span style={{color:C.teal,fontWeight:700}}>{tokenModal.campaign.name}</span></div>
        </div>
        <div style={{background:C.accent+"11",border:`1px solid ${C.accent}33`,borderRadius:10,padding:12,marginBottom:14,fontSize:12,color:C.muted,lineHeight:1.6}}>
          ℹ️ Token anonimo — l'esito viene deciso <b style={{color:C.text}}>solo al momento della giocata</b>.
        </div>
        <Btn full onClick={()=>doGenToken(tokenModal.customer,tokenModal.campaign)} color={C.gold}>🎰 Genera Token</Btn>
      </div>:<div style={{textAlign:"center"}}>
        <div style={{fontSize:40,marginBottom:8}}>✅</div>
        <div style={{color:C.text,fontWeight:700,fontSize:16,marginBottom:4}}>Token generato!</div>
        <div style={{background:C.primary,borderRadius:12,padding:16,marginBottom:14}}>
          <div style={{fontFamily:"monospace",fontSize:17,fontWeight:800,color:C.gold,letterSpacing:2,wordBreak:"break-all"}}>{genToken_.token}</div>
          <div style={{color:C.muted,fontSize:11,marginTop:6}}>{genToken_.campaign_name} · {today()}</div>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{color:C.muted,fontSize:11,textTransform:"uppercase",marginBottom:8}}>QR Code</div>
          <QRDisplay value={`https://friggitoriafratellicaruso.github.io/crunchclub?t=${genToken_.token}`} size={110}/>
        </div>
        {/* BLUETOOTH */}
        <div style={{background:C.primary,borderRadius:12,padding:16,marginBottom:12,textAlign:"left"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>

// ── SCRATCH CARD CANVAS ───────────────────────────────────────────────────
function ScratchCard({won,prizeName,onScratched}){
  const canvasRef=useRef(null);
  const drawing=useRef(false);
  const pct=useRef(0);
  const notified=useRef(false);
  const W=280,H=170,BRUSH=38,REVEAL_AT=50; // % pixel trasparenti per rivelare

  useEffect(()=>{
    const canvas=canvasRef.current;if(!canvas)return;
    const ctx=canvas.getContext("2d");
    ctx.clearRect(0,0,W,H);
    // Disegna layer grattabile completamente opaco
    const grad=ctx.createLinearGradient(0,0,W,H);
    grad.addColorStop(0,"#B8860B");
    grad.addColorStop(0.4,"#FFD700");
    grad.addColorStop(0.6,"#DAA520");
    grad.addColorStop(1,"#B8860B");
    ctx.fillStyle=grad;
    ctx.beginPath();ctx.roundRect(0,0,W,H,16);ctx.fill();
    // Pattern righe
    ctx.strokeStyle="rgba(0,0,0,0.08)";ctx.lineWidth=1;
    for(let i=0;i<W+H;i+=18){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(0,i);ctx.stroke();}
    // Testo "Gratta!"
    ctx.fillStyle="rgba(0,0,0,0.5)";ctx.font="bold 15px Inter,system-ui,sans-serif";
    ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText("👆  Gratta per scoprire!",W/2,H/2);
    pct.current=0;notified.current=false;
  },[won,prizeName]);

  const getXY=(e,canvas)=>{
    const r=canvas.getBoundingClientRect();
    const scaleX=canvas.width/r.width,scaleY=canvas.height/r.height;
    if(e.touches){
      return[(e.touches[0].clientX-r.left)*scaleX,(e.touches[0].clientY-r.top)*scaleY];
    }
    return[(e.clientX-r.left)*scaleX,(e.clientY-r.top)*scaleY];
  };

  const scratch=(e)=>{
    if(!drawing.current)return;
    e.preventDefault();
    const canvas=canvasRef.current;if(!canvas)return;
    const ctx=canvas.getContext("2d");
    const[x,y]=getXY(e,canvas);
    ctx.globalCompositeOperation="destination-out";
    ctx.beginPath();
    ctx.arc(x,y,BRUSH,0,Math.PI*2);
    ctx.fill();
    ctx.globalCompositeOperation="source-over";
    // Calcola % grattato
    if(notified.current)return;
    const img=ctx.getImageData(0,0,W,H);
    let transparent=0;
    for(let i=3;i<img.data.length;i+=4){if(img.data[i]<128)transparent++;}
    pct.current=Math.round(transparent/(W*H)*100);
    if(pct.current>=REVEAL_AT&&!notified.current){notified.current=true;onScratched();}
  };

  const start=(e)=>{drawing.current=true;scratch(e);};
  const stop=()=>{drawing.current=false;};

  return <canvas ref={canvasRef} width={W} height={H}
    style={{borderRadius:16,cursor:"crosshair",display:"block",touchAction:"none",width:"100%",maxWidth:W,boxShadow:`0 0 0 2px ${C.gold}66`}}
    onMouseDown={start} onMouseMove={scratch} onMouseUp={stop} onMouseLeave={stop}
    onTouchStart={start} onTouchMove={scratch} onTouchEnd={stop}
  />;
}

// INSTANT WIN
// ══════════════════════════════════════════════════════════════════════════
function InstantWin({addetto}){
  const{data:camps,loading,err,load}=useTable("campagne","id");
  const{data:tokens}=useTable("tokens","id");
  const[tab,setTab]=useState("Campagne");
  const[showNew,setShowNew]=useState(false);
  const[playToken,setPlayToken]=useState("");
  const[playResult,setPlayResult]=useState(null);
  // scratchPct removed — ora gestito dal canvas ScratchCard
  const[scratched,setScratched]=useState(false);
  const[cf,setCf]=useState({name:"",start_date:"",end_date:"",trigger_type:"importo",trigger_value:20,prizes:[{id:"p1",name:"Caffè gratis",probability:10,total:100,value:"~€1,50"},{id:"p2",name:"Sconto 10%",probability:8,total:80,value:"variabile"}]});
  const[saving,setSaving]=useState(false);

  const createCamp=async()=>{
    if(!cf.name)return;
    setSaving(true);
    const nc={id:"CAMP-"+uid(),name:cf.name,active:true,start_date:cf.start_date,end_date:cf.end_date,trigger_type:cf.trigger_type,trigger_value:cf.trigger_value,
      prizes:JSON.stringify(cf.prizes.map(p=>({...p,remaining:p.total}))),
      stats:JSON.stringify({generated:0,played:0,won:0})};
    const{error}=await sb.from("campagne").insert(nc);
    if(error)alert(error.message);
    else{setShowNew(false);load();}
    setSaving(false);
  };

  const toggleCamp=async(camp)=>{
    await sb.from("campagne").update({active:!camp.active}).eq("id",camp.id);
    load();
  };

  const playOp=async()=>{
    const tk=playToken.trim();
    const{data:found}=await sb.from("tokens").select("*").eq("token",tk).single();
    if(!found){setPlayResult({error:"Token non trovato."});return;}
    if(found.status!=="Non giocato"){setPlayResult({error:"Token già utilizzato."});return;}
    const{data:camp}=await sb.from("campagne").select("*").eq("id",found.campaign_id).single();
    if(!camp||!camp.active){setPlayResult({error:"Campagna non attiva."});return;}
    const prizes=typeof camp.prizes==="string"?JSON.parse(camp.prizes):camp.prizes;
    const stats=typeof camp.stats==="string"?JSON.parse(camp.stats):camp.stats;
    const outcome=assignOutcome({prizes});
    // update token
    await sb.from("tokens").update({status:outcome.won?"Vinto":"Non vinto",won:outcome.won,prize_name:outcome.prizeName,played_at:today()}).eq("token",tk);
    // update campaign prizes + stats
    let updPrizes=prizes;
    if(outcome.won)updPrizes=prizes.map(p=>p.id===outcome.prizeId?{...p,remaining:Math.max(0,p.remaining-1)}:p);
    await sb.from("campagne").update({prizes:JSON.stringify(updPrizes),stats:JSON.stringify({...stats,played:stats.played+1,won:stats.won+(outcome.won?1:0)})}).eq("id",camp.id);
    setPlayResult({...outcome,customerName:found.customer_name});
    setScratched(false);load();
  };

  const doScratch=()=>{}; // handled by ScratchCard canvas

  if(loading)return <Loading/>;
  return <div className="fade">
    <SH title="Instant Win" sub="Token anonimi — esito in tempo reale"/>
    <ErrBox msg={err}/>
    <Tabs tabs={["Campagne","Simula","Storico"]} active={tab} onChange={setTab}/>

    {tab==="Campagne"&&<div>
      <div style={{display:"flex",justifyContent:"flex-end",marginBottom:12}}><Btn onClick={()=>setShowNew(true)}>+ Nuova campagna</Btn></div>
      {camps.map(camp=>{
        const stats=typeof camp.stats==="string"?JSON.parse(camp.stats):camp.stats;
        const prizes=typeof camp.prizes==="string"?JSON.parse(camp.prizes):camp.prizes;
        return <div key={camp.id} style={{background:C.card,borderRadius:14,padding:18,marginBottom:14,border:`1px solid ${camp.active?C.gold+"44":C.border}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
            <div>
              <div style={{fontWeight:800,fontSize:16,color:C.text}}>{camp.name}</div>
              <div style={{color:C.muted,fontSize:12,marginTop:2}}>{camp.start_date} → {camp.end_date} · €{camp.trigger_value} min.</div>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <Badge text={camp.active?"Attiva":"Inattiva"} color={camp.active?C.green:C.muted}/>
              <Btn sm color={camp.active?C.accent:C.green} outline onClick={()=>toggleCamp(camp)}>{camp.active?"Sospendi":"Riattiva"}</Btn>
            </div>
          </div>
          <div style={{display:"flex",gap:16,marginBottom:10}}>
            {[["Token",stats.generated,C.blue],["Giocati",stats.played,C.teal],["Vincitori",stats.won,C.green]].map(([l,v,c])=><div key={l} style={{textAlign:"center"}}>
              <div style={{color:c,fontWeight:800,fontSize:17}}>{v}</div><div style={{color:C.muted,fontSize:10}}>{l}</div>
            </div>)}
          </div>
          <Bar val={stats.played} max={Math.max(stats.generated,1)} color={C.gold}/>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:10}}>
            {prizes.map(p=><div key={p.id} style={{background:C.primary,borderRadius:8,padding:"5px 10px"}}>
              <span style={{color:C.text,fontSize:12}}>{p.name}</span>
              <span style={{color:C.gold,fontSize:11,marginLeft:8}}>{p.probability}% · {p.remaining}/{p.total}</span>

          </div>
        </div>;

    </div>}

    {tab==="Simula"&&<div style={{maxWidth:420,margin:"0 auto",textAlign:"center"}}>

          <span style={{color:cf.prizes.reduce((s,p)=>s+p.probability,0)>100?C.accent:C.gold,fontWeight:700}}>{cf.prizes.reduce((s,p)=>s+p.probability,0)}%</span>
        </div>
      </div>
      <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
        <Btn outline color={C.muted} onClick={()=>setShowNew(false)}>Annulla</Btn>
        <Btn onClick={createCamp} disabled={saving}>{saving?<Spinner/>:"Crea campagna"}</Btn>
      </div>
    </Modal>}
  </div>;
}

// GIFT CARD
// ══════════════════════════════════════════════════════════════════════════
function GiftCards(){
  const{data:cards,loading,err,load}=useTable("gift_cards","id");
  const{data:customers}=useTable("clienti","name");
  const[showAdd,setShowAdd]=useState(false);
  const[useCard,setUseCard]=useState(null);
  const[form,setForm]=useState({type:"Gift Card",value:50,ownerId:"",expiry:""});
  const[useAmt,setUseAmt]=useState("");
  const[saving,setSaving]=useState(false);

  const create=async()=>{
    setSaving(true);
    const owner=customers.find(c=>c.id===parseInt(form.ownerId));
    const{error}=await sb.from("gift_cards").insert({id:"GC-"+uid(),type:form.type,code:form.type.slice(0,2).toUpperCase()+"-"+uid()+"-"+uid(),value:parseFloat(form.value),remaining:parseFloat(form.value),owner_id:owner?.id||null,owner:owner?.name||"—",status:"Attiva",created:today(),expiry:form.expiry,usages:[]});
    if(error)alert(error.message);
    else{setShowAdd(false);load();}
    setSaving(false);
  };

  const apply=async()=>{
    const amt=parseFloat(useAmt);
    const nr=useCard.type==="Conta Ingressi"?useCard.remaining-1:Math.max(0,useCard.remaining-amt);
    const usages=[...(useCard.usages||[]),{date:today(),amount:useCard.type==="Conta Ingressi"?1:amt}];
    await sb.from("gift_cards").update({remaining:nr,status:nr<=0?"Esaurita":"Attiva",usages}).eq("id",useCard.id);
    setUseCard(null);setUseAmt("");load();
  };

  if(loading)return <Loading/>;
  return <div className="fade">
    <SH title="Gift Card" action="+ Emetti" onAction={()=>setShowAdd(true)}/>
    <ErrBox msg={err}/>
    <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap"}}>
      {[["Gift Card","🎁",C.purple],["Prepagata","💳",C.teal],["Conta Ingressi","🎫",C.gold]].map(([t,ic,c])=>{
        const cc=cards.filter(x=>x.type===t&&x.status==="Attiva");
        return <div key={t} style={{flex:"1 1 130px",background:C.card,borderRadius:14,padding:16,borderTop:`3px solid ${c}`}}>
          <div style={{fontSize:24}}>{ic}</div>
          <div style={{fontWeight:700,color:C.text,marginTop:8,fontSize:14}}>{t}</div>
          <div style={{color:c,fontSize:18,fontWeight:800,marginTop:4}}>{cc.length} attive</div>
          <div style={{color:C.muted,fontSize:11}}>{t==="Conta Ingressi"?`${cc.reduce((s,x)=>s+x.remaining,0)} ing.`:fmtE(cc.reduce((s,x)=>s+x.remaining,0))}</div>
        </div>;
      })}
    </div>
    <div style={{display:"grid",gap:10}}>
      {cards.map(c=><div key={c.id} style={{background:C.card,borderRadius:12,padding:16,display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
        <div style={{flex:1,minWidth:120}}>
          <Badge text={c.type} color={c.type==="Gift Card"?C.purple:c.type==="Prepagata"?C.teal:C.gold}/>
          <div style={{fontFamily:"monospace",fontSize:11,color:C.muted,marginTop:4}}>{c.code}</div>
          <div style={{color:C.text,fontSize:12,marginTop:2}}>{c.owner}</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{color:C.gold,fontWeight:800,fontSize:16}}>{c.type==="Conta Ingressi"?`${c.remaining} ing.`:fmtE(c.remaining)}</div>
          <Badge text={c.status} color={stColor(c.status)}/>
        </div>
        {c.status==="Attiva"&&<Btn sm color={C.teal} onClick={()=>setUseCard(c)}>Usa</Btn>}
      </div>)}
      {cards.length===0&&<div style={{background:C.card,borderRadius:12,padding:28,textAlign:"center",color:C.muted}}>Nessuna carta emessa.</div>}
    </div>
    {showAdd&&<Modal title="💳 Emetti carta" onClose={()=>setShowAdd(false)}>
      <Inp label="Tipo" value={form.type} onChange={v=>setForm({...form,type:v})} opts={["Gift Card","Prepagata","Conta Ingressi"]}/>
      <Inp label={form.type==="Conta Ingressi"?"Ingressi":"Valore (€)"} value={form.value} onChange={v=>setForm({...form,value:v})} type="number"/>
      <Inp label="Scadenza" value={form.expiry} onChange={v=>setForm({...form,expiry:v})} type="date"/>
      <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
        <Btn outline color={C.muted} onClick={()=>setShowAdd(false)}>Annulla</Btn>
        <Btn onClick={create} disabled={saving}>{saving?<Spinner/>:"Genera"}</Btn>
      </div>
    </Modal>}
    {useCard&&<Modal title={`💳 ${useCard.code}`} onClose={()=>setUseCard(null)}>
      <div style={{background:C.primary,borderRadius:10,padding:14,marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:C.text}}>{useCard.type}</span><span style={{color:C.gold,fontWeight:700,fontSize:18}}>{useCard.type==="Conta Ingressi"?`${useCard.remaining} ing.`:fmtE(useCard.remaining)}</span></div>
        <div style={{color:C.muted,fontSize:13,marginTop:4}}>Titolare: {useCard.owner}</div>
      </div>
      {useCard.type!=="Conta Ingressi"&&<Inp label="Importo (€)" value={useAmt} onChange={setUseAmt} type="number"/>}
      <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
        <Btn outline color={C.muted} onClick={()=>setUseCard(null)}>Annulla</Btn>
        <Btn color={C.teal} onClick={apply}>{useCard.type==="Conta Ingressi"?"Segna ingresso":"Scala importo"}</Btn>
      </div>
    </Modal>}
  </div>;
}

// MENU
// ══════════════════════════════════════════════════════════════════════════
function MenuDigitale(){
  const{data:items,loading,err,load}=useTable("menu_items","category");
  const[showAdd,setShowAdd]=useState(false);
  const[editItem,setEditItem]=useState(null);
  const[form,setForm]=useState({category:"Antipasti",name:"",descrizione:"",price:"",available:true,img:"🍽️"});
  const[saving,setSaving]=useState(false);
  const cats=[...new Set(items.map(i=>i.category))];

  const toggle=async(item)=>{
    await sb.from("menu_items").update({available:!item.available}).eq("id",item.id);
    load();
  };
  const save=async()=>{
    if(!form.name||!form.price)return;
    setSaving(true);
    if(editItem)await sb.from("menu_items").update({...form,price:parseFloat(form.price)}).eq("id",editItem.id);
    else await sb.from("menu_items").insert({...form,price:parseFloat(form.price),allergens:[]});
    setShowAdd(false);setEditItem(null);load();setSaving(false);
  };

  if(loading)return <Loading/>;
  return <div className="fade">
    <SH title="Menù Digitale" action="+ Voce" onAction={()=>{setEditItem(null);setForm({category:cats[0]||"Antipasti",name:"",descrizione:"",price:"",available:true,img:"🍽️"});setShowAdd(true);}}/>
    <ErrBox msg={err}/>
    <div style={{background:C.card,borderRadius:10,padding:"10px 14px",marginBottom:16,display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
      <span style={{color:C.teal}}>🔗</span>
      <span style={{color:C.muted,fontSize:13}}>menu.miolocale.it/QR-ABC123</span>
      <Btn sm color={C.teal} outline>📋 Copia</Btn>
    </div>
    {cats.map(cat=><div key={cat} style={{marginBottom:18}}>
      <div style={{paddingLeft:12,borderLeft:`3px solid ${C.accent}`,marginBottom:10}}>
        <span style={{fontWeight:700,color:C.accent,fontSize:12,textTransform:"uppercase"}}>{cat}</span>
      </div>
      <div style={{background:C.card,borderRadius:12,overflow:"hidden"}}>
        {items.filter(i=>i.category===cat).map((item,idx,arr)=><div key={item.id} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",borderBottom:idx<arr.length-1?`1px solid ${C.border}22`:"none",opacity:item.available?1:.5}}>
          <span style={{fontSize:20}}>{item.img}</span>
          <div style={{flex:1}}>
            <div style={{color:C.text,fontWeight:600,fontSize:14}}>{item.name}</div>
            {item.descrizione&&<div style={{color:C.muted,fontSize:11}}>{item.descrizione}</div>}
          </div>
          <div style={{color:C.gold,fontWeight:800,fontSize:14}}>{fmtE(item.price)}</div>
          <div onClick={()=>toggle(item)} style={{width:34,height:20,background:item.available?C.green:C.dim,borderRadius:10,cursor:"pointer",position:"relative",flexShrink:0}}>
            <div style={{position:"absolute",top:2,left:item.available?16:2,width:16,height:16,background:"#fff",borderRadius:8,transition:"left .15s"}}/>
          </div>
          <Btn sm outline color={C.muted} onClick={()=>{setEditItem(item);setForm({category:item.category,name:item.name,descrizione:item.descrizione||"",price:item.price.toString(),available:item.available,img:item.img});setShowAdd(true);}}>✏️</Btn>
        </div>)}
      </div>
    </div>)}
    {showAdd&&<Modal title={editItem?"✏️ Modifica":"➕ Nuova voce"} onClose={()=>{setShowAdd(false);setEditItem(null);}}>
      <Inp label="Nome" value={form.name} onChange={v=>setForm({...form,name:v})} req/>
      <Inp label="Prezzo (€)" value={form.price} onChange={v=>setForm({...form,price:v})} type="number" req/>
      <Inp label="Categoria" value={form.category} onChange={v=>setForm({...form,category:v})} opts={cats.length?cats:["Antipasti"]}/>
      <Inp label="Icona" value={form.img} onChange={v=>setForm({...form,img:v})}/>
      <Inp label="Descrizione" value={form.descrizione} onChange={v=>setForm({...form,descrizione:v})}/>
      <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
        <Btn outline color={C.muted} onClick={()=>setShowAdd(false)}>Annulla</Btn>
        <Btn onClick={save} disabled={saving}>{saving?<Spinner/>:(editItem?"Salva":"Aggiungi")}</Btn>
      </div>
    </Modal>}
  </div>;
}

// NOTIFICHE
// ══════════════════════════════════════════════════════════════════════════
function Notifiche(){
  const{data:notifications,load}=useTable("notifiche","created_at");
  const[msg,setMsg]=useState("");
  const[target,setTarget]=useState("Tutti");
  const[loading,setLoading]=useState(false);

  const aiSuggest=async()=>{
    setLoading(true);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:200,messages:[{role:"user",content:`Scrivi notifica push max 110 caratteri per CrunchClub, segmento: ${target}. Emoji, urgenza. Solo il testo.`}]})});
      const d=await res.json();setMsg(d.content[0]?.text||"");
    }catch{}
    setLoading(false);
  };

  const send=async()=>{
    if(!msg.trim())return;
    await sb.from("notifiche").insert({text:msg,target,date:today(),opens:0,clicks:0});
    setMsg("");load();
  };

  const tpls=["🌟 Oggi doppi punti su ogni acquisto!","🎰 Nuovo Instant Win! Gioca subito.","🎂 Buon compleanno! Il tuo regalo è in app.","🔥 Solo questo weekend: -20% per te!"];

  return <div className="fade">
    <SH title="Notifiche Push"/>
    <div style={{background:C.card,borderRadius:14,padding:18,marginBottom:14}}>
      <div style={{color:C.muted,fontSize:11,textTransform:"uppercase",marginBottom:10}}>Destinatari</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:14}}>
        {["Tutti","VIP","Gold","Silver","Regolare","Nuovo"].map(t=><button key={t} onClick={()=>setTarget(t)} style={{background:target===t?C.accent:C.primary,color:target===t?"#fff":C.muted,border:"none",borderRadius:20,padding:"5px 13px",cursor:"pointer",fontSize:12}}>{t}</button>)}
      </div>
      <textarea value={msg} onChange={e=>setMsg(e.target.value)} placeholder="Testo notifica…" rows={3} style={{width:"100%",background:C.primary,color:C.text,border:`1px solid ${C.border}`,borderRadius:10,padding:12,fontSize:14,resize:"vertical",boxSizing:"border-box",marginBottom:12}}/>
      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
        <button onClick={aiSuggest} disabled={loading} style={{background:C.purple,color:"#fff",border:"none",borderRadius:8,padding:"9px 16px",cursor:"pointer",fontWeight:600,fontSize:13,opacity:loading?.6:1}}>{loading?"⏳…":"✨ AI"}</button>
        <Btn onClick={send} disabled={!msg.trim()}>📤 Invia</Btn>
      </div>
    </div>
    <div style={{background:C.card,borderRadius:14,padding:18,marginBottom:14}}>
      <div style={{color:C.muted,fontSize:11,textTransform:"uppercase",marginBottom:10}}>Template rapidi</div>
      {tpls.map((t,i)=><div key={i} onClick={()=>setMsg(t)} style={{background:C.primary,borderRadius:8,padding:"9px 12px",marginBottom:8,cursor:"pointer",border:`1px solid ${msg===t?C.accent+"66":C.border+"33"}`,fontSize:13,color:C.text}}>{t}</div>)}
    </div>
    {notifications.length>0&&<div>
      <div style={{color:C.muted,fontSize:12,textTransform:"uppercase",marginBottom:10}}>Storico</div>
      {[...notifications].reverse().map(n=><div key={n.id} style={{background:C.card,borderRadius:12,padding:14,marginBottom:10}}>
        <div style={{color:C.text,fontSize:13,marginBottom:6}}>{n.text}</div>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <Badge text={`→ ${n.target}`} color={C.teal} sm/>
          <span style={{color:C.muted,fontSize:11}}>{n.date}</span>
        </div>
      </div>)}
    </div>}
  </div>;
}

// ══════════════════════════════════════════════════════════════════════════
// PREMI CATALOGO — gestione premi riscattabili con punti (solo admin)
// ══════════════════════════════════════════════════════════════════════════
function PremiCatalogo(){
  const{data:premi,loading,err,load,insert,update,remove}=useTable("premi_catalogo","ordine");
  const[showAdd,setShowAdd]=useState(false);
  const[editItem,setEditItem]=useState(null);
  const[form,setForm]=useState({nome:"",icona:"🎁",punti_costo:"",categoria:"Prodotto",descrizione:"",ordine:"0"});
  const[saving,setSaving]=useState(false);
  const[formErr,setFormErr]=useState("");

  const CATEGORIE=["Prodotto","Sconto","Gift Card","Esperienza"];

  const openAdd=()=>{setForm({nome:"",icona:"🎁",punti_costo:"",categoria:"Prodotto",descrizione:"",ordine:String(premi.length+1)});setEditItem(null);setShowAdd(true);};
  const openEdit=(p)=>{setForm({nome:p.nome,icona:p.icona,punti_costo:String(p.punti_costo),categoria:p.categoria,descrizione:p.descrizione||"",ordine:String(p.ordine)});setEditItem(p);setShowAdd(true);};

  const salva=async()=>{
    if(!form.nome.trim()||!form.punti_costo){setFormErr("Nome e punti obbligatori.");return;}
    setSaving(true);setFormErr("");
    const payload={nome:form.nome.trim(),icona:form.icona||"🎁",punti_costo:parseInt(form.punti_costo),categoria:form.categoria,descrizione:form.descrizione.trim(),ordine:parseInt(form.ordine)||0};
    try{
      if(editItem){await update(editItem.id,payload);}
      else{await insert({...payload,id:"p"+Date.now(),attivo:true});}
      setShowAdd(false);setEditItem(null);
    }catch(e){setFormErr(e.message);}
    setSaving(false);
  };

  const toggleAttivo=async(p)=>{
    await update(p.id,{attivo:!p.attivo});
  };

  const elimina=async(p)=>{
    if(!confirm(`Eliminare "${p.nome}"?`))return;
    await remove(p.id);
  };

  if(loading)return <Loading/>;
  return <div className="fade">
    <SH title="Premi Catalogo" sub={`${premi.filter(p=>p.attivo).length} attivi`} action="+ Nuovo premio" onAction={openAdd}/>
    <ErrBox msg={err}/>
    <div style={{display:"grid",gap:10}}>
      {premi.map(p=><div key={p.id} style={{background:C.card,borderRadius:14,padding:16,border:`1px solid ${p.attivo?C.border:C.dim+"44"}`,opacity:p.attivo?1:0.6}}>
        <div style={{display:"flex",gap:12,alignItems:"center"}}>
          <div style={{width:48,height:48,background:C.primary,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>{p.icona}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginBottom:4}}>
              <span style={{color:C.text,fontWeight:700,fontSize:15}}>{p.nome}</span>
              <Badge text={p.categoria} color={C.teal} sm/>
              {!p.attivo&&<Badge text="Nascosto" color={C.muted} sm/>}
            </div>
            {p.descrizione&&<div style={{color:C.muted,fontSize:12,marginBottom:4}}>{p.descrizione}</div>}
            <div style={{color:C.gold,fontWeight:800,fontSize:14}}>{fmt(p.punti_costo)} pt</div>
          </div>
          <div style={{display:"flex",gap:6,flexShrink:0}}>
            {/* Toggle visibilità */}
            <div onClick={()=>toggleAttivo(p)} style={{width:38,height:22,background:p.attivo?C.green:C.dim,borderRadius:11,cursor:"pointer",position:"relative",flexShrink:0,transition:"background .2s"}}>
              <div style={{position:"absolute",top:3,left:p.attivo?18:3,width:16,height:16,background:"#fff",borderRadius:8,transition:"left .2s"}}/>
            </div>
            <Btn sm color={C.gold} outline onClick={()=>openEdit(p)}>✏️</Btn>
            <Btn sm color={C.accent} outline onClick={()=>elimina(p)}>🗑️</Btn>
          </div>
        </div>
      </div>)}
      {premi.length===0&&<div style={{background:C.card,borderRadius:12,padding:28,textAlign:"center",color:C.muted}}>Nessun premio nel catalogo. Creane uno!</div>}
    </div>

    {showAdd&&<Modal title={editItem?"✏️ Modifica premio":"🏅 Nuovo premio"} onClose={()=>{setShowAdd(false);setEditItem(null);}}>
      <ErrBox msg={formErr}/>
      <div style={{display:"grid",gridTemplateColumns:"60px 1fr",gap:"0 12px"}}>
        <div>
          <label style={{color:C.muted,fontSize:11,display:"block",marginBottom:5,textTransform:"uppercase"}}>Icona</label>
          <input value={form.icona} onChange={e=>setForm({...form,icona:e.target.value})} style={{width:"100%",background:C.primary,color:C.text,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px",fontSize:22,textAlign:"center",boxSizing:"border-box"}}/>
        </div>
        <Inp label="Nome premio" value={form.nome} onChange={v=>setForm({...form,nome:v})} req placeholder="Es. Caffè espresso"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <div style={{marginBottom:13}}>
          <label style={{color:C.muted,fontSize:11,display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:.5}}>Punti richiesti <span style={{color:C.accent}}>*</span></label>
          <input type="number" value={form.punti_costo} onChange={e=>setForm({...form,punti_costo:e.target.value})} placeholder="es. 250" style={{width:"100%",background:C.primary,color:C.gold,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px",fontSize:16,fontWeight:700,boxSizing:"border-box"}}/>
        </div>
        <Inp label="Categoria" value={form.categoria} onChange={v=>setForm({...form,categoria:v})} opts={CATEGORIE}/>
      </div>
      <Inp label="Descrizione (opzionale)" value={form.descrizione} onChange={v=>setForm({...form,descrizione:v})} placeholder="Breve descrizione del premio"/>
      <Inp label="Ordine visualizzazione" value={form.ordine} onChange={v=>setForm({...form,ordine:v})} type="number"/>
      <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
        <Btn outline color={C.muted} onClick={()=>{setShowAdd(false);setEditItem(null);}}>Annulla</Btn>
        <Btn onClick={salva} disabled={saving}>{saving?<Spinner/>:(editItem?"Salva":"Crea")}</Btn>
      </div>
    </Modal>}
  </div>;
}
